<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TohfaHub — Ultimate UI Panel Reviewer</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #090a0f;
      --surface-sidebar: #10121a;
      --surface-card: #151824;
      --surface-header: rgba(16, 18, 26, 0.8);
      --border: #242938;
      --border-hover: #3b435c;
      --accent: #7c6af7;
      --accent-gradient: linear-gradient(135deg, #7c6af7 0%, #ec4899 100%);
      --accent-alpha: rgba(124, 106, 247, 0.15);
      --text: #f3f4f6;
      --muted: #9ca3af;
      --muted-dark: #6b7280;
      
      --badge-auth: #fbbf24;
      --badge-auth-bg: rgba(251, 191, 36, 0.1);
      --badge-buyer: #34d399;
      --badge-buyer-bg: rgba(52, 211, 153, 0.1);
      --badge-seller: #a78bfa;
      --badge-seller-bg: rgba(167, 139, 250, 0.1);
      --badge-admin: #f87171;
      --badge-admin-bg: rgba(248, 113, 113, 0.1);
      --badge-comp: #60a5fa;
      --badge-comp-bg: rgba(96, 165, 250, 0.1);
      
      --sidebar-width: 340px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* App Container Layout */
    .app-container {
      display: flex;
      width: 100%;
      height: 100vh;
    }

    /* Sidebar Styles */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--surface-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      height: 100%;
      z-index: 50;
    }

    .sidebar-header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--accent-gradient);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 4px 15px rgba(124, 106, 247, 0.3);
    }

    .logo-text {
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .path-config {
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: rgba(0, 0, 0, 0.2);
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .path-config label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .path-config input {
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 12px;
      outline: none;
      font-family: monospace;
      width: 100%;
    }

    .search-wrapper {
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 12px 16px 12px 42px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      transition: all 0.2s;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 3px rgba(124, 106, 247, 0.15);
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: 16px;
    }

    /* Scrollable Panel List in Sidebar */
    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .sidebar-list::-webkit-scrollbar {
      width: 6px;
    }
    .sidebar-list::-webkit-scrollbar-track {
      background: transparent;
    }
    .sidebar-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
    .sidebar-list::-webkit-scrollbar-thumb:hover {
      background: var(--border-hover);
    }

    .category-group {
      margin-bottom: 20px;
    }

    .category-group-header {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted-dark);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 8px;
      padding-left: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .category-count-badge {
      font-size: 10px;
      background: rgba(255, 255, 255, 0.05);
      padding: 2px 6px;
      border-radius: 8px;
    }

    .panel-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
      cursor: pointer;
      line-height: 1.4;
    }

    .panel-link:hover {
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
    }

    .panel-link.active {
      background: var(--accent-alpha);
      color: #fff;
      font-weight: 600;
      border-left: 3px solid var(--accent);
      padding-left: 9px;
    }

    .panel-link-id {
      font-family: monospace;
      font-weight: bold;
      color: var(--muted-dark);
      font-size: 11px;
      background: rgba(0, 0, 0, 0.2);
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .panel-link.active .panel-link-id {
      color: var(--accent);
      background: rgba(124, 106, 247, 0.2);
    }

    .panel-link-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    /* Main View Styles */
    .main-view {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    /* Header / Top Nav */
    header {
      background: var(--surface-header);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 40;
      height: 72px;
      flex-shrink: 0;
    }

    .filter-chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
    }

    .filter-chip {
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .filter-chip:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--border-hover);
      color: var(--text);
    }

    .filter-chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 4px 12px rgba(124, 106, 247, 0.25);
    }

    .header-stats {
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
      background: rgba(255, 255, 255, 0.03);
      padding: 6px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .stat-highlight {
      color: var(--text);
      font-weight: 700;
    }

    /* Cards Scroll Container */
    .cards-container {
      flex: 1;
      overflow-y: auto;
      padding: 40px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
    }

    .cards-container::-webkit-scrollbar {
      width: 8px;
    }
    .cards-container::-webkit-scrollbar-track {
      background: transparent;
    }
    .cards-container::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }
    .cards-container::-webkit-scrollbar-thumb:hover {
      background: var(--border-hover);
    }

    .panel-card {
      width: 100%;
      max-width: 1000px;
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .panel-card:hover {
      border-color: var(--border-hover);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
    }

    /* Card Header */
    .card-header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      background: rgba(255, 255, 255, 0.01);
    }

    .card-title-section {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .card-number {
      width: 38px;
      height: 38px;
      background: var(--accent-gradient);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 800;
      color: white;
      box-shadow: 0 4px 10px rgba(124, 106, 247, 0.2);
    }

    .card-meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .card-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }

    .category-badge {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .category-badge.auth { color: var(--badge-auth); background: var(--badge-auth-bg); border: 1px solid rgba(251, 191, 36, 0.2); }
    .category-badge.buyer { color: var(--badge-buyer); background: var(--badge-buyer-bg); border: 1px solid rgba(52, 211, 153, 0.2); }
    .category-badge.seller { color: var(--badge-seller); background: var(--badge-seller-bg); border: 1px solid rgba(167, 139, 250, 0.2); }
    .category-badge.admin { color: var(--badge-admin); background: var(--badge-admin-bg); border: 1px solid rgba(248, 113, 113, 0.2); }
    .category-badge.components { color: var(--badge-comp); background: var(--badge-comp-bg); border: 1px solid rgba(96, 165, 250, 0.2); }

    /* Resource Paths Metadata Table */
    .resource-paths {
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 20px;
      margin: 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 12px;
    }

    .resource-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .resource-label {
      color: var(--muted);
      font-weight: 600;
      width: 120px;
      flex-shrink: 0;
    }

    .resource-value {
      font-family: monospace;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      background: rgba(255, 255, 255, 0.02);
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.02);
    }

    .resource-value.empty {
      color: var(--muted-dark);
      border-style: dashed;
      background: transparent;
    }

    .resource-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .open-link-icon {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 5px;
      background: rgba(124, 106, 247, 0.1);
      transition: all 0.2s;
      font-size: 11px;
    }

    .open-link-icon:hover {
      background: var(--accent);
      color: white;
    }

    .copy-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
      padding: 3px 6px;
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.03);
      position: relative;
    }
    .copy-btn:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
    }
    .copy-btn::after {
      content: 'Copied!';
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%) translateY(-4px);
      background: #000;
      color: #fff;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 10px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      white-space: nowrap;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    .copy-btn.copied::after {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Card Tabs & Preview Utilities */
    .card-tabs-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: rgba(0, 0, 0, 0.15);
      border-bottom: 1px solid var(--border);
    }

    .preview-tabs {
      display: flex;
      gap: 6px;
    }

    .preview-tab {
      background: transparent;
      border: none;
      color: var(--muted);
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s;
      font-family: inherit;
    }
    .preview-tab:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.04);
    }
    .preview-tab.active {
      color: #fff;
      background: rgba(255, 255, 255, 0.08);
    }

    .card-controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .responsive-controls {
      display: flex;
      background: rgba(0, 0, 0, 0.3);
      padding: 3px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .responsive-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 5px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .responsive-btn:hover {
      color: var(--text);
    }
    .responsive-btn.active {
      background: var(--accent);
      color: #fff;
    }

    .open-tab-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    .open-tab-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--border-hover);
      color: var(--text);
    }

    /* Viewer Area */
    .viewer-area {
      position: relative;
      background: #030406;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 400px;
      max-height: 700px;
      overflow: hidden;
      padding: 16px;
    }

    .screenshot-view {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .screenshot-view img {
      max-width: 100%;
      max-height: 600px;
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      object-fit: contain;
    }

    .iframe-view {
      width: 100%;
      height: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .iframe-view iframe {
      width: 100%;
      height: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    .iframe-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      color: var(--muted);
      text-align: center;
      padding: 40px;
    }

    .iframe-placeholder-icon {
      font-size: 48px;
      opacity: 0.3;
    }

    .load-iframe-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 15px rgba(124, 106, 247, 0.3);
    }

    .load-iframe-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(124, 106, 247, 0.4);
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 40px;
      text-align: center;
      color: var(--muted);
      background: var(--surface-card);
      border-radius: 20px;
      border: 1px dashed var(--border);
      width: 100%;
      max-width: 600px;
      margin: 40px auto;
    }
    .empty-icon {
      font-size: 64px;
      margin-bottom: 20px;
      opacity: 0.5;
    }
    .empty-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    /* Copy Feedback Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #10b981;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      z-index: 9999;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>

<div class="app-container">
  <!-- Left Navigation Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">🎁</div>
        <span class="logo-text">TohfaHub Reviewer</span>
      </div>

      <div class="path-config">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px;">
          <label for="basePathInput">Workspace Base Path</label>
          <button onclick="resetBasePath()" style="background: transparent; border: none; color: var(--accent); font-size: 10px; cursor: pointer; font-weight: bold; font-family: inherit;">Reset Auto</button>
        </div>
        <input type="text" id="basePathInput" placeholder="Auto-detecting relative path...">
      </div>

      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="searchInput" placeholder="Search panels or files...">
      </div>
    </div>

    <div class="sidebar-list" id="sidebarList">
      <!-- List generated dynamically -->
    </div>
  </aside>

  <!-- Right Viewer Main Panel -->
  <div class="main-view">
    <header>
      <div class="filter-chips" id="filterChips">
        <button class="filter-chip active" data-category="All">🌐 All <span class="category-count-badge" id="count-all">0</span></button>
        <button class="filter-chip" data-category="Auth">🔒 Auth <span class="category-count-badge" id="count-auth">0</span></button>
        <button class="filter-chip" data-category="Buyer">🛍️ Buyer <span class="category-count-badge" id="count-buyer">0</span></button>
        <button class="filter-chip" data-category="Seller">🎨 Seller <span class="category-count-badge" id="count-seller">0</span></button>
        <button class="filter-chip" data-category="Admin">⚙️ Admin <span class="category-count-badge" id="count-admin">0</span></button>
        <button class="filter-chip" data-category="Components">🧱 Components <span class="category-count-badge" id="count-comp">0</span></button>
      </div>
      <div class="header-stats">
        Showing <span id="visibleCount" class="stat-highlight">0</span> of <span id="totalCount" class="stat-highlight">0</span> panels
      </div>
    </header>

    <div class="cards-container" id="cardsContainer">
      <!-- Cards generated dynamically -->
    </div>
  </div>
</div>

<div class="toast" id="globalToast">Path copied to clipboard!</div>

<script>
// Path resolver to prepend design_mockups/ where necessary
function getMockupUrl(path, basePath) {
  if (!path) return null;
  if (path.startsWith('http') || path.startsWith('design_mockups/')) {
    return `${basePath}${path}`;
  }
  if (path.startsWith('stitch_screens/stitch_search/')) {
    return `${basePath}${path}`;
  }
  const folders = ['auth_screens/', 'botanical_seller_studio/', 'stitch_screens/', 'admin_screens/', 'components/'];
  if (folders.some(f => path.startsWith(f))) {
    return `${basePath}design_mockups/${path}`;
  }
  return `${basePath}${path}`;
}

// Helper for admin folder mappings since they were restructured in design_mockups/admin_screens/
function getAdminMockupUrl(path, basePath) {
  if (!path) return null;
  const adminMappings = {
    'tohfa_admin_audit_logs_updated_sidebar/': 'admin_screens/audit_logs/',
    'tohfa_admin_categories_manager_updated_sidebar/': 'admin_screens/categories_manager/',
    'tohfa_admin_order_detail_updated_sidebar/': 'admin_screens/order_detail/',
    'tohfa_admin_orders_management_updated_sidebar/': 'admin_screens/orders_management/',
    'tohfa_admin_payment_health_updated_sidebar/': 'admin_screens/payment_health/',
    'tohfa_admin_products_sponsored_management/': 'admin_screens/products_sponsored/',
    'tohfa_admin_seller_detail_updated_sidebar/': 'admin_screens/seller_detail/',
    'tohfa_admin_sellers_directory/': 'admin_screens/sellers_directory/'
  };
  let resolvedPath = path;
  for (const [key, value] of Object.entries(adminMappings)) {
    if (path.startsWith(key)) {
      resolvedPath = path.replace(key, value);
      break;
    }
  }
  return getMockupUrl(resolvedPath, basePath);
}

// Sort panels numerically by ID to make browsing logical
panels.sort((a, b) => a.id - b.id);

// ─────────────────────────────────────────────
// STATE & CONFIG
// ─────────────────────────────────────────────
const STORAGE_KEY_BASE_PATH = 'tohfahub_reviewer_base_path';

// Automatically detect the relative base path based on location
function detectRelativeBase() {
  const path = window.location.pathname;
  // If the file is inside the project_docs directory, the repo root is one level up (../)
  if (path.includes('/project_docs/') || path.includes('\\project_docs\\')) {
    return '../';
  }
  // If the path contains TohfaHub_project-1, we are running inside the repo folder
  if (path.includes('TohfaHub_project-1')) {
    return '';
  } else {
    // We are running outside (on Desktop)
    return 'antigravity_workspace/TohfaHub_project-1/';
  }
}

let currentCategory = 'All';
let searchQuery = '';
let basePath = localStorage.getItem(STORAGE_KEY_BASE_PATH);
if (basePath === null) {
  basePath = detectRelativeBase();
} else {
  // Sanitize stored path: remove trailing commas, semicolons, convert backslashes to forward slashes
  basePath = basePath.replace(/[,;]+$/, '').trim().replace(/\\/g, '/');
  if (basePath && !basePath.endsWith('/') && !basePath.startsWith('file:///')) {
    basePath += '/';
  }
}

// Track active view state of cards (activeTab: 'screenshot' | 'iframe', iframeResponsiveWidth: '100%' | '768px' | '375px')
const cardStates = {};
panels.forEach(p => {
  cardStates[p.id] = {
    activeTab: p.screenshot ? 'screenshot' : 'iframe',
    width: '100%',
    loaded: false
  };
});

// ─────────────────────────────────────────────
// DOM ELEMENTS
// ─────────────────────────────────────────────
const basePathInput = document.getElementById('basePathInput');
const searchInput = document.getElementById('searchInput');
const sidebarList = document.getElementById('sidebarList');
const cardsContainer = document.getElementById('cardsContainer');
const filterChips = document.getElementById('filterChips');
const visibleCountEl = document.getElementById('visibleCount');
const totalCountEl = document.getElementById('totalCount');
const globalToast = document.getElementById('globalToast');

// Set initial path input value
basePathInput.value = basePath;

// ─────────────────────────────────────────────
// INITIALIZATION & EVENT LISTENERS
// ─────────────────────────────────────────────
function init() {
  renderSidebar();
  renderCards();
  updateCategoryCounts();
  setupScrollSpy();

  // Input listeners
  basePathInput.addEventListener('change', (e) => {
    let value = e.target.value.trim();
    // Sanitize: remove trailing commas, semicolons, convert backslashes to forward slashes
    value = value.replace(/[,;]+$/, '').trim().replace(/\\/g, '/');
    if (value && !value.endsWith('/') && !value.startsWith('file:///')) {
      value += '/';
    }
    basePath = value;
    basePathInput.value = basePath; // update the input text field with sanitized value
    localStorage.setItem(STORAGE_KEY_BASE_PATH, basePath);
    // Reload cards to apply new base path
    renderCards();
  });

  searchInput.addEventListener('input', (e) => {
    searchQuery = e.target.value.toLowerCase().trim();
    filterAndFilterDisplay();
  });

  // Filter click handler
  filterChips.addEventListener('click', (e) => {
    const chip = e.target.closest('.filter-chip');
    if (!chip) return;

    // Set active class
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');

    currentCategory = chip.dataset.category;
    filterAndFilterDisplay();
  });
}

// Reset base path to automatic discovery
function resetBasePath() {
  localStorage.removeItem(STORAGE_KEY_BASE_PATH);
  basePath = detectRelativeBase();
  basePathInput.value = basePath;
  renderCards();
  showToast("Reset base path to auto-detection!");
}

// ─────────────────────────────────────────────
// FILTERING LOGIC
// ─────────────────────────────────────────────
function getFilteredPanels() {
  return panels.filter(p => {
    const matchesCategory = currentCategory === 'All' || p.category === currentCategory;
    const matchesSearch = searchQuery === '' || 
      p.title.toLowerCase().includes(searchQuery) ||
      (p.filePath && p.filePath.toLowerCase().includes(searchQuery)) ||
      (p.code && p.code.toLowerCase().includes(searchQuery)) ||
      String(p.id).includes(searchQuery);
    return matchesCategory && matchesSearch;
  });
}

function filterAndFilterDisplay() {
  // Filter panels based on search & category
  const filtered = getFilteredPanels();
  
  // Toggle visible cards
  document.querySelectorAll('.panel-card').forEach(card => {
    const cardId = parseInt(card.dataset.id);
    const isVisible = filtered.some(p => p.id === cardId);
    card.style.display = isVisible ? 'flex' : 'none';
  });

  // Toggle visible sidebar links
  document.querySelectorAll('.panel-link').forEach(link => {
    const cardId = parseInt(link.dataset.id);
    const isVisible = filtered.some(p => p.id === cardId);
    link.style.display = isVisible ? 'flex' : 'none';
  });

  // Toggle category header displays if no links visible under them
  document.querySelectorAll('.category-group').forEach(group => {
    const visibleLinks = Array.from(group.querySelectorAll('.panel-link')).filter(l => l.style.display !== 'none');
    group.style.display = visibleLinks.length > 0 ? 'block' : 'none';
  });

  // Update numbers
  visibleCountEl.textContent = filtered.length;
  
  // Handle empty state
  const existingEmpty = document.getElementById('empty-search-state');
  if (filtered.length === 0) {
    if (!existingEmpty) {
      const emptyHtml = `
        <div class="empty-state" id="empty-search-state">
          <div class="empty-icon">🔍</div>
          <div class="empty-title">No Panels Found</div>
          <div class="empty-text">No panels match your current search query "${searchQuery}" or category filter.</div>
        </div>
      `;
      cardsContainer.insertAdjacentHTML('beforeend', emptyHtml);
    }
  } else if (existingEmpty) {
    existingEmpty.remove();
  }
}

function updateCategoryCounts() {
  const counts = { All: panels.length, Auth: 0, Buyer: 0, Seller: 0, Admin: 0, Components: 0 };
  panels.forEach(p => {
    if (counts[p.category] !== undefined) {
      counts[p.category]++;
    }
  });

  document.getElementById('count-all').textContent = counts.All;
  document.getElementById('count-auth').textContent = counts.Auth;
  document.getElementById('count-buyer').textContent = counts.Buyer;
  document.getElementById('count-seller').textContent = counts.Seller;
  document.getElementById('count-admin').textContent = counts.Admin;
  document.getElementById('count-comp').textContent = counts.Components;

  totalCountEl.textContent = panels.length;
  visibleCountEl.textContent = panels.length;
}

// ─────────────────────────────────────────────
// SIDEBAR RENDER
// ─────────────────────────────────────────────
function renderSidebar() {
  const categories = ['Auth', 'Buyer', 'Seller', 'Admin', 'Components'];
  let sidebarHtml = '';

  categories.forEach(cat => {
    const catPanels = panels.filter(p => p.category === cat);
    if (catPanels.length === 0) return;

    sidebarHtml += `
      <div class="category-group" data-category="${cat}">
        <div class="category-group-header">
          <span>${cat}</span>
          <span class="category-count-badge">${catPanels.length}</span>
        </div>
        <div class="category-group-links">
          ${catPanels.map(p => `
            <a class="panel-link" href="#panel-${p.id}" data-id="${p.id}">
              <span class="panel-link-id">${p.id}</span>
              <span class="panel-link-title" title="${p.title}">${p.title}</span>
            </a>
          `).join('')}
        </div>
      </div>
    `;
  });

  sidebarList.innerHTML = sidebarHtml;

  // Add click handlers for scrolling and activating link
  sidebarList.querySelectorAll('.panel-link').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      const targetId = link.getAttribute('href');
      const targetElement = document.querySelector(targetId);
      
      if (targetElement) {
        // Scroll to card
        targetElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
        
        // Update active class
        sidebarList.querySelectorAll('.panel-link').forEach(l => l.classList.remove('active'));
        link.classList.add('active');
      }
    });
  });
}

// ─────────────────────────────────────────────
// CARDS CONTAINER RENDER
// ─────────────────────────────────────────────
function renderCards() {
  let cardsHtml = '';

  panels.forEach(p => {
    const screenshotUrl = p.screenshot ? (p.category === 'Admin' ? getAdminMockupUrl(p.screenshot, basePath) : getMockupUrl(p.screenshot, basePath)) : null;
    const codeUrl = p.code ? (p.category === 'Admin' ? getAdminMockupUrl(p.code, basePath) : getMockupUrl(p.code, basePath)) : null;
    const fileUrl = p.filePath ? `${basePath}${p.filePath}` : null;
    const activePreviewUrl = p.filePath ? fileUrl : (p.code ? codeUrl : null);

    const hasScreenshot = !!p.screenshot;
    const hasIframe = !!activePreviewUrl;

    const currentCardState = cardStates[p.id];
    const activeTab = currentCardState.activeTab;

    cardsHtml += `
      <div class="panel-card" id="panel-${p.id}" data-id="${p.id}">
        <!-- Header -->
        <div class="card-header">
          <div class="card-title-section">
            <div class="card-number">${p.id}</div>
            <div class="card-meta">
              <div class="card-title">${p.title}</div>
            </div>
          </div>
          <span class="category-badge ${p.category.toLowerCase()}">${p.category}</span>
        </div>

        <!-- Resource Paths Metadata -->
        <div class="resource-paths">
          <div class="resource-item">
            <span class="resource-label">📷 Screenshot:</span>
            ${p.screenshot ? `
              <span class="resource-value">${p.screenshot}</span>
              <div class="resource-actions">
                <button class="copy-btn" onclick="copyPath('${screenshotUrl}', this)" title="Copy Absolute URL">Copy Link</button>
                <a href="${screenshotUrl}" target="_blank" class="open-link-icon">Open ↗</a>
              </div>
            ` : `
              <span class="resource-value empty">None available</span>
            `}
          </div>
          
          <div class="resource-item">
            <span class="resource-label">💻 Design HTML:</span>
            ${p.code ? `
              <span class="resource-value">${p.code}</span>
              <div class="resource-actions">
                <button class="copy-btn" onclick="copyPath('${codeUrl}', this)" title="Copy Absolute URL">Copy Link</button>
                <a href="${codeUrl}" target="_blank" class="open-link-icon">Open ↗</a>
              </div>
            ` : `
              <span class="resource-value empty">None available</span>
            `}
          </div>

          <div class="resource-item">
            <span class="resource-label">📁 Integrated App:</span>
            ${p.filePath ? `
              <span class="resource-value">${p.filePath}</span>
              <div class="resource-actions">
                <button class="copy-btn" onclick="copyPath('${fileUrl}', this)" title="Copy Absolute URL">Copy Link</button>
                <a href="${fileUrl}" target="_blank" class="open-link-icon">Open ↗</a>
              </div>
            ` : `
              <span class="resource-value empty">Unmapped (Design Template Only)</span>
            `}
          </div>
        </div>

        <!-- Tab control row -->
        <div class="card-tabs-row">

              </button>

            ${hasIframe ? `
              <button class="preview-tab ${activeTab === 'iframe' ? 'active' : ''}" 
                      onclick="setCardTab(${p.id}, 'iframe')">
                🌐 Live Interactive Preview
              </button>
            ` : ''}
          </div>

          <div class="card-controls">
            <!-- Responsive toggles (only shown when iframe active) -->
            <div class="responsive-controls" id="resp-controls-${p.id}" style="${activeTab === 'iframe' ? 'display: flex' : 'display: none'}">
              <button class="responsive-btn active" onclick="setCardWidth(${p.id}, '100%', this)">🖥️ Desktop</button>
              <button class="responsive-btn" onclick="setCardWidth(${p.id}, '768px', this)">📱 Tablet</button>
              <button class="responsive-btn" onclick="setCardWidth(${p.id}, '375px', this)">📱 Mobile</button>

            <!-- Open in New Tab Link -->

                🔗 Open Page ↗

              <a class="open-tab-btn" href="${codeUrl}" target="_blank" title="Open page in a new full browser tab">
                🔗 Open Page ↗
              </a>

          </div>
        </div>

        <!-- Viewer Content Area -->
        <div class="viewer-area">
          <!-- Screenshot View -->
          ${hasScreenshot ? `
            <div class="screenshot-view" id="screenshot-view-${p.id}" style="${activeTab === 'screenshot' ? 'display: flex' : 'display: none'}">
              <img src="${screenshotUrl}" alt="${p.title}" onerror="handleImageError(this, ${p.id})">
            </div>
          ` : ''}

          <!-- Live Preview Iframe View -->
          ${hasIframe ? `
            <div class="iframe-view" id="iframe-view-${p.id}" style="width: 100%; ${activeTab === 'iframe' ? 'display: flex' : 'display: none'}">
              <div class="iframe-placeholder" id="iframe-placeholder-${p.id}">
                <div class="iframe-placeholder-icon">🌐</div>
                <div>Interactive preview deferred to save memory</div>
                <button class="load-iframe-btn" onclick="loadCardIframe(${p.id}, '${activePreviewUrl}')">Load Live Preview</button>
              </div>
              <iframe data-src="${activePreviewUrl}" id="iframe-${p.id}" style="display: none;" loading="lazy"></iframe>

            ${!hasScreenshot ? `

  cardsContainer.innerHTML = cardsHtml;

  // Setup Lazy Loading Observer for cards that enter screen
  setupLazyLoadingObserver();

// ─────────────────────────────────────────────
// CARD DISPLAY MANIPULATION
// ─────────────────────────────────────────────
function setCardTab(id, tab) {
  cardStates[id].activeTab = tab;

  const screenshotView = document.getElementById(`screenshot-view-${id}`);
  const iframeView = document.getElementById(`iframe-view-${id}`);
  const respControls = document.getElementById(`resp-controls-${id}`);

  // Get current active tab button and remove class
  const card = document.getElementById(`panel-${id}`);
  card.querySelectorAll('.preview-tab').forEach(t => t.classList.remove('active'));

  if (tab === 'screenshot') {
    if (screenshotView) screenshotView.style.display = 'flex';
    if (iframeView) iframeView.style.display = 'none';
    if (respControls) respControls.style.display = 'none';
    
    // Find active tab and set active class
    const tabBtn = Array.from(card.querySelectorAll('.preview-tab')).find(t => t.textContent.includes('Screenshot'));
    if (tabBtn) tabBtn.classList.add('active');
  } else {
    if (screenshotView) screenshotView.style.display = 'none';
    if (iframeView) iframeView.style.display = 'flex';
    if (respControls) respControls.style.display = 'flex';
    
    // Find active tab and set active class
    const tabBtn = Array.from(card.querySelectorAll('.preview-tab')).find(t => t.textContent.includes('Live Interactive'));
    if (tabBtn) tabBtn.classList.add('active');

    // Auto load iframe when switching to tab
    const iframe = document.getElementById(`iframe-${id}`);
    if (iframe && !cardStates[id].loaded) {
      loadCardIframe(id, iframe.dataset.src);
    }
  }
}

function setCardWidth(id, width, btnElement) {
  cardStates[id].width = width;
  
  // Set button active states
  const controls = document.getElementById(`resp-controls-${id}`);
  controls.querySelectorAll('.responsive-btn').forEach(btn => btn.classList.remove('active'));
  btnElement.classList.add('active');

  const viewContainer = document.getElementById(`iframe-view-${id}`);
  viewContainer.style.width = width;
}

function loadCardIframe(id, url) {
  const placeholder = document.getElementById(`iframe-placeholder-${id}`);
  const iframe = document.getElementById(`iframe-${id}`);
  
  if (placeholder && iframe) {
    placeholder.style.display = 'none';
    iframe.style.display = 'block';
    iframe.src = url;
    cardStates[id].loaded = true;
  }
}

function handleImageError(img, id) {
  img.style.display = 'none';
  const panel = panels.find(p => p.id === id);
  const screenshotUrl = panel.screenshot ? (panel.category === 'Admin' ? getAdminMockupUrl(panel.screenshot, basePath) : getMockupUrl(panel.screenshot, basePath)) : '';
  
  // Show error message placeholder in place of screenshot
  const parent = img.parentElement;
  parent.innerHTML = `
    <div class="iframe-placeholder">
      <div class="iframe-placeholder-icon">⚠️</div>
      <div style="font-weight: 700; color: var(--danger); font-size: 15px;">Screenshot Failed to Load</div>
      <div style="font-size: 12px; margin-top: 4px; max-width: 450px; color: var(--muted); line-height: 1.4;">
        Could not load resource: <span style="font-family: monospace; color: var(--text); word-break: break-all; background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px;">${screenshotUrl}</span>
      </div>
      <div style="font-size: 11px; margin-top: 8px; max-width: 450px; line-height: 1.4; color: var(--muted-dark);">
        Tip: Make sure the <b>Workspace Base Path</b> in the sidebar matches the folder path of your TohfaHub repo relative to this HTML file.
      </div>
      <div style="display: flex; gap: 10px; margin-top: 15px;">
        <a href="${screenshotUrl}" target="_blank" class="load-iframe-btn" style="font-size: 12px; padding: 8px 16px; background: rgba(255,255,255,0.08); color: var(--text);">Open Image ↗</a>
        ${(panel.filePath || panel.code) ? `
          <button class="load-iframe-btn" style="font-size: 12px; padding: 8px 16px;" onclick="setCardTab(${id}, 'iframe')">Switch to Live Preview</button>
        ` : ''}
      </div>
    </div>
  `;
}

// Copy Helper
function copyPath(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('copied');
    showToast(`Link copied to clipboard!`);
    setTimeout(() => {
      btn.classList.remove('copied');
    }, 1500);
  });
}

function showToast(message) {
  globalToast.textContent = message;
  globalToast.classList.add('show');
  setTimeout(() => {
    globalToast.classList.remove('show');
  }, 2500);
}

// ─────────────────────────────────────────────
// INTERSECTION OBSERVERS (LAZY LOADING & SCROLLSPY)
// ─────────────────────────────────────────────
function setupLazyLoadingObserver() {
  // Lazy loads iframes when cards come close to screen (200px margin)
  // This triggers load for cards that do not have screenshots (since iframe is their default view)
  const options = {
    root: null, // viewport
    rootMargin: '200px 0px 200px 0px',
    threshold: 0
  };

  const observer = new IntersectionObserver((entries, observer) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const card = entry.target;
        const cardId = parseInt(card.dataset.id);
        const panel = panels.find(p => p.id === cardId);
        
        // If card is showing iframe by default (no screenshot) and not loaded yet
        if (!panel.screenshot && cardStates[cardId].activeTab === 'iframe' && !cardStates[cardId].loaded) {
          const iframe = document.getElementById(`iframe-${cardId}`);
          if (iframe) {
            loadCardIframe(cardId, iframe.dataset.src);
          }
        }
        
        // Stop observing this card
        observer.unobserve(card);
      }
    });
  }, options);

  document.querySelectorAll('.panel-card').forEach(card => observer.observe(card));
}

function setupScrollSpy() {
  const options = {
    root: null,
    rootMargin: '-20% 0px -60% 0px', // Trigger when card occupies top-middle of viewport
    threshold: 0
  };

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const cardId = entry.target.dataset.id;
        
        // Deactivate all sidebar items
        document.querySelectorAll('.panel-link').forEach(link => {
          link.classList.remove('active');
        });
        
        // Activate matching sidebar item
        const activeLink = document.querySelector(`.panel-link[data-id="${cardId}"]`);
        if (activeLink) {
          activeLink.classList.add('active');
          
          // Scroll sidebar list to keep active item visible
          activeLink.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
      }
    });
  }, options);

  document.querySelectorAll('.panel-card').forEach(card => observer.observe(card));
}

// Initialize on load
window.addEventListener('DOMContentLoaded', init);
</script>
