<script>
        // Simple micro-interaction for the mascot movement
        document.addEventListener('mousemove', (e) => {
            const mascot = document.querySelector('.group img');
            if (!mascot) return;
            
            const xAxis = (window.innerWidth / 2 - e.pageX) / 45;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 45;
            
            mascot.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg) scale(1.05)`;
        });

        document.addEventListener('mouseleave', () => {
            const mascot = document.querySelector('.group img');
            if (mascot) mascot.style.transform = `rotateY(0deg) rotateX(0deg) scale(1)`;
        });
    </script>
