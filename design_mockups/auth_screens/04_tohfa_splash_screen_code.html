<style>
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes drift {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0.2; }
            50% { transform: translate(15px, -10px) rotate(5deg); opacity: 0.4; }
            100% { transform: translate(0, 0) rotate(0deg); opacity: 0.2; }
        }

        @keyframes pulseWash {
            0%, 100% { background-color: rgba(197, 214, 188, 0.05); }
            50% { background-color: rgba(216, 203, 233, 0.05); }
        }

        .animate-fade-up {
            animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .watermark {
            position: absolute;
            opacity: 0.08;
            pointer-events: none;
            z-index: 0;
            filter: grayscale(1);
        }

        .ink-wash {
            position: fixed;
            inset: 0;
            z-index: -1;
            animation: pulseWash 8s ease-in-out infinite;
            background: radial-gradient(circle at 20% 30%, rgba(197, 214, 188, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(216, 203, 233, 0.15) 0%, transparent 50%);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }

        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }

        .sketch-particle {
            position: absolute;
            width: 20px;
            height: 20px;
            animation: drift 10s infinite ease-in-out;
        }
    </style>

        // Simple entry pulse for the whole page content
        window.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.animate-fade-up').forEach((el, i) => {

            });
        });

        // Interactive subtle mouse tracking for the background
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 20;
            const y = (e.clientY / window.innerHeight) * 20;
            const wash = document.querySelector('.ink-wash');
            if (wash) {
                wash.style.background = `radial-gradient(circle at ${20 + (x/2)}% ${30 + (y/2)}%, rgba(197, 214, 188, 0.15) 0%, transparent 50%),
                                         radial-gradient(circle at ${80 - (x/2)}% ${70 - (y/2)}%, rgba(216, 203, 233, 0.15) 0%, transparent 50%)`;
            }
        });
