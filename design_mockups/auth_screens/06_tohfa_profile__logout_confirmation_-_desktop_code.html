<style>
      body {
        background-color: #f9faf5;
        background-image: radial-gradient(circle at 10% 20%, rgba(197, 214, 188, 0.1) 0%, transparent 40%);
        min-height: 100vh;
      }
      .ink-wash {
        background: radial-gradient(circle at top right, rgba(197, 214, 188, 0.15), transparent 70%);
      }
      .modal-scrim {
        background-color: rgba(197, 214, 188, 0.4);
        backdrop-filter: blur(4px);
      }
      .sketch-overlay {
        position: relative;
      }
      .sketch-overlay::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
        opacity: 0.08;
        pointer-events: none;
        z-index: 1;
      }
      .custom-shadow {
        box-shadow: 0 10px 30px -10px rgba(58, 51, 40, 0.15);
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      }

<body class="bg-[#F5F3EF] font-body-main text-text-default sketch-overlay">
<!-- TopNavBar -->

<!-- Main Content -->

</div>
<div class="absolute bottom-0 right-0 bg-[#C8973A] text-white p-1 rounded-full border-2 border-[#FDFAF5] cursor-pointer hover:bg-[#2D5016] transition-colors">
<span class="material-symbols-outlined text-[14px]">edit</span>
</div>
</div>
<h1 class="mt-4 font-serif font-bold text-2xl text-[#1A1A1A]">Amara Keita</h1>
<p class="font-serif italic text-sm text-[#6B6B6B] mt-1">Connected to Collective</p>
<div class="flex gap-2 mt-4">
<span class="px-3 py-1 rounded-[20px] bg-[#E8E4F4] text-[#7B5EA7] font-sans text-xs font-medium flex items-center gap-1">
<span class="w-1.5 h-1.5 rounded-full bg-[#7B5EA7]"></span> Top Artisan
</span>
<span class="px-3 py-1 rounded-[20px] bg-[#E0EDD8] text-[#2D5016] font-sans text-xs font-medium flex items-center gap-1">
<span class="w-1.5 h-1.5 rounded-full bg-[#2D5016]"></span> Pro Seller
</span>
</div>
</div>
<!-- Settings List -->
<div class="divide-y divide-[#F0EDE6] px-6 py-2">
<button class="w-full flex items-center justify-between py-4 hover:bg-[#F0EDE6]/30 transition-colors group px-4 rounded-lg">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#6B6B6B] group-hover:text-[#2D5016] transition-colors" data-icon="person_outline">person_outline</span>

<div class="flex items-center gap-4">

</div>

</button>

</button>
</div>
</div>
<p class="mt-6 font-sans text-[#6B6B6B] text-[11px] text-center">Version 1.4.2 — Tohfa Studio Collective</p>
</div>

<!-- Logout Modal Overlay -->
<div class="fixed inset-0 z-[60] flex items-center justify-center modal-scrim opacity-0 pointer-events-none transition-all duration-300" id="logoutModal">
<div class="bg-[#FDFAF5] border border-[#D4C9B8] rounded-[16px] p-10 max-w-sm w-full mx-4 shadow-[0_4px_24px_rgba(0,0,0,0.07)] transform scale-95 transition-transform duration-300 relative overflow-hidden">

<div class="flex flex-col gap-3 w-full">
<button class="w-full bg-[#2D5016] text-white font-semibold text-sm py-3.5 rounded-[8px] hover:bg-[#1e360f] transition-colors shadow-md focus:ring-2 focus:ring-primary/20" onclick="toggleModal(false)">
                        Stay
                    </button>
<button class="w-full bg-[#FDFAF5] border border-[#D4C9B8] text-[#6B6B6B] font-semibold text-sm py-3.5 rounded-[8px] hover:bg-[#F0EDE6] transition-all" onclick="window.location.reload()">
                        Log out
                    </button>
</div>
</div>
</div>
</div>
<!-- Footer -->
<div id="tohfa-footer"></div>
<script>
        function toggleModal(show) {
            const modal = document.getElementById('logoutModal');
            const content = modal.querySelector('div');
            if (show) {
                modal.classList.remove('opacity-0', 'pointer-events-none');
                content.classList.remove('scale-95');
                content.classList.add('scale-100');
            } else {
                modal.classList.add('opacity-0', 'pointer-events-none');
                content.classList.add('scale-95');
                content.classList.remove('scale-100');
            }
        }

        // Close modal on escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') toggleModal(false);
        });
        
        // Interaction micro-animations
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', () => {
                btn.style.transform = 'scale(0.98)';
                btn.style.opacity = '0.8';
            });
            btn.addEventListener('mouseup', () => {
                btn.style.transform = 'scale(1)';
                btn.style.opacity = '1';
            });
        });
    </script>
<script src="../components/tohfa-include.js"></script></body></html>
