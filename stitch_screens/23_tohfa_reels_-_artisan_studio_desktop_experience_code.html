<!-- Footer Shell -->

<script>
        // Micro-interaction for the progress bar simulation
        let progress = 45;
        const progressBar = document.getElementById('progress-bar');
        
        setInterval(() => {
            progress += 0.2;
            if (progress > 100) progress = 0;
            progressBar.style.width = progress + '%';
        }, 100);

        // Hover scale interaction
        const reelCard = document.querySelector('.group');
        reelCard.addEventListener('mousedown', () => {
            reelCard.style.transform = 'scale(0.98)';
        });
        reelCard.addEventListener('mouseup', () => {
            reelCard.style.transform = 'scale(1.01)';
        });
    </script>
