<script>
        // Simple Atmospheric Confetti Micro-interaction
        const canvas = document.getElementById('confetti');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = canvas.width / 2 + (Math.random() - 0.5) * 100;
                this.y = canvas.height / 2 + (Math.random() - 0.5) * 100;
                this.size = Math.random() * 4 + 2;
                this.speedX = (Math.random() - 0.5) * 8;
                this.speedY = (Math.random() - 0.5) * 12 - 5;
                this.color = ['#255338', '#bceecb', '#ecdcff', '#70539b', '#f9ecdc'][Math.floor(Math.random() * 5)];
                this.gravity = 0.2;
                this.alpha = 1;
            }

            update() {
                this.speedY += this.gravity;
                this.x += this.speedX;
                this.y += this.speedY;
                this.alpha -= 0.005;
            }

            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            for (let i = 0; i < 60; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].alpha <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animate);
        }

        // Trigger on load
        setTimeout(() => {
            init();
            animate();
        }, 300);

        // Re-trigger on message hover for playfulness
        document.querySelector('h1').addEventListener('mouseenter', () => {
            if (particles.length < 20) init();
        });
    </script>
