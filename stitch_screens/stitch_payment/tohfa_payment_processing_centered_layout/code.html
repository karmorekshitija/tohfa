<script>
        // Simulate a tiny micro-interaction for the "processing" dots if needed
        const statusText = document.querySelector('h1');
        let dots = 0;
        setInterval(() => {
            dots = (dots + 1) % 4;
            const dotStr = ".".repeat(dots);
            const baseText = "Processing your payment";
            statusText.innerHTML = `${baseText}<span class="inline-block w-4 text-left">${dotStr}</span>`;
        }, 600);
