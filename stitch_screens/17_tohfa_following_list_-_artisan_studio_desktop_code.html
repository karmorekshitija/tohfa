<script>
        // Micro-interaction for follow buttons
        document.querySelectorAll('.follow-btn-active').forEach(button => {
            button.addEventListener('click', function() {
                const isFollowing = this.textContent.trim().includes('Following');
                if (isFollowing) {
                    this.innerHTML = '<span class="material-symbols-outlined text-[18px]">add</span> Follow';
                    this.classList.remove('bg-surface-container-low', 'text-primary');
                    this.classList.add('bg-primary', 'text-on-primary');
                } else {
                    this.innerHTML = '<span class="material-symbols-outlined text-[18px]">check</span> Following';
                    this.classList.add('bg-surface-container-low', 'text-primary');
                    this.classList.remove('bg-primary', 'text-on-primary');
                }
            });
        });

        // Search highlight interaction
        const searchInput = document.querySelector('input[type="text"]');
        searchInput.addEventListener('focus', () => {
            searchInput.parentElement.classList.add('scale-[1.01]');
        });
        searchInput.addEventListener('blur', () => {
            searchInput.parentElement.classList.remove('scale-[1.01]');
        });
    </script>
