<body class="min-h-screen flex flex-col font-body-md text-on-surface">
<!-- Artisan Watermarks -->
<div class="artisan-watermark top-[15%] left-[5%] rotate-[-12deg]">
<span class="material-symbols-outlined !text-[120px]" data-icon="inventory_2">inventory_2</span>
</div>
<div class="artisan-watermark bottom-[20%] right-[8%] rotate-[15deg]">
<span class="material-symbols-outlined !text-[140px]" data-icon="gesture">gesture</span>
</div>
<!-- TopNavBar -->
<!-- Standardised Top Navigation Bar (Task 57) -->
<header class="w-full sticky top-0 z-50 bg-white border-b border-[#C1C9C0] flex justify-between items-center px-margin-desktop h-20">
  <!-- Brand Logo (Task 59) -->
  <div class="flex items-center flex-1">
    <a class="font-['Playfair_Display'] text-[32px] italic text-[#255338] select-none" href="/">
      Tohfa<span class="text-[#D4AF37]">.</span>
    </a>
  </div>
  
  <!-- Navigation Links -->
  <nav class="hidden md:flex items-center justify-center gap-xl h-full">
    <!-- Home -->
    <a href="/" class="flex items-center gap-xs text-[#414942] hover:text-[#255338] transition-colors h-full px-1 font-['DM_Sans'] text-[16px] font-normal">
      <span class="material-symbols-outlined text-[20px]">home</span>
      <span>Home</span>
    </a>
    <!-- Category (Discover) -->
    <a href="/category" class="flex items-center gap-xs text-[#414942] hover:text-[#255338] transition-colors h-full px-1 font-['DM_Sans'] text-[16px] font-normal">
      <span class="material-symbols-outlined text-[20px]">search</span>
      <span>Category</span>
    </a>
    <!-- Reels -->
    <a href="/reels" class="flex items-center gap-xs text-[#414942] hover:text-[#255338] transition-colors h-full px-1 font-['DM_Sans'] text-[16px] font-normal">
      <span class="material-symbols-outlined text-[20px]">movie</span>
      <span>Reels</span>
    </a>
    <!-- Profile -->
    <a href="/profile" class="flex items-center gap-xs text-[#255338] border-b-2 border-[#255338] h-full px-1 font-['DM_Sans'] text-[16px] font-normal">
      <span class="material-symbols-outlined text-[20px]">person</span>
      <span>Profile</span>
    </a>
  </nav>
  
  <!-- Right side items -->
  <div class="flex items-center justify-end flex-1 gap-lg">
    <button class="text-[#255338] p-2 hover:bg-[#C1C9C0]/20 rounded-full active:scale-95 duration-200 transition-all">
      <span class="material-symbols-outlined">search</span>
    </button>
    <a href="/cart" class="text-[#255338] p-2 hover:bg-[#C1C9C0]/20 rounded-full active:scale-95 duration-200 transition-all">
      <span class="material-symbols-outlined">shopping_cart</span>
    </a>
    <button class="text-[#255338] p-2 hover:bg-[#C1C9C0]/20 rounded-full active:scale-95 duration-200 transition-all">
      <span class="material-symbols-outlined">notifications</span>
    </button>
    <!-- Profile Avatar (Task 58) -->
    <a href="/profile" class="w-10 h-10 rounded-full bg-[#3D6B4F] flex items-center justify-center text-white font-bold border border-[#C1C9C0] text-sm overflow-hidden flex-shrink-0 cursor-pointer flex items-center justify-center" >
      A
    </a>
  </div>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex items-center justify-center relative px-margin-mobile z-10 py-xl">
<div class="max-w-xl w-full text-center fade-in-up">
<!-- Illustration Header -->
<div class="relative inline-block mb-lg">
<img alt="Celebration" class="w-64 h-64 mx-auto object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBqswnyo7lkPB96sljKK_P9pxcKeOxZzgDjQzN3h5Kiq2X6pJF5Slv3SZrOntLFxB-9XbrRcHVdUAOL9R45ugSUJdnoGhNO6On4rhavbxnAKtpiZo1ai_j9wTu_CvpadcLBkgPB5QHAGqa2t1je3v5o3e5RHtERW_SAV5cJgETsVeZDvGB_FdvUVK7NSnSk3x7ymFlKrxgzRqp86fYYUATRFoBuAKNd8g49yv1pF2d1ntoohD9ArUR3meG0HKFSeZCi3Aqar94tjM8">
<div class="absolute -top-4 -right-4 animate-bounce">
<span class="material-symbols-outlined text-tertiary !text-xl" data-icon="auto_awesome">auto_awesome</span>
</div>
</div>
<!-- Success Message -->
<h1 class="font-headline-lg-mobile md:text-headline-lg text-primary mb-sm">
                Order placed ✦
            </h1>
<p class="text-on-surface-variant font-body-md mb-md max-w-sm mx-auto">
                The maker has been notified — your gift is on its way.
            </p>
<!-- Order ID Pill -->
<div class="inline-flex items-center gap-sm bg-surface-container-low px-md py-xs rounded-full border border-outline-variant mb-xl">
<span class="material-symbols-outlined text-secondary !text-sm" data-icon="confirmation_number">confirmation_number</span>
<span class="font-data-price text-[13px] text-secondary">#TF-2024-8842</span>
</div>
<!-- Actions -->
<div class="flex flex-col md:flex-row gap-md justify-center items-center">
<button class="w-full md:w-auto px-xl py-md bg-primary text-white rounded-lg font-body-md font-bold hover:opacity-90 transform active:scale-95 transition-all shadow-sm">
                    View order
                </button>
<button class="w-full md:w-auto px-xl py-md bg-white border border-outline text-primary rounded-lg font-body-md font-bold hover:bg-surface-container-lowest transform active:scale-95 transition-all">
                    Keep browsing
                </button>
</div>
<!-- Secondary Context -->
<div class="mt-xl pt-lg border-t border-outline-variant/30 text-on-surface-variant/60 italic text-sm">
                We've sent a confirmation email with all the details of your artisan piece.
            </div>
</div>
</main>
<!-- Footer -->

<script>
        // Micro-interaction for the "Order Placed" star icon
        document.addEventListener('DOMContentLoaded', () => {
            const h1 = document.querySelector('h1');
            h1.addEventListener('mouseenter', () => {
                const colors = ['#255338', '#573b81', '#49663f'];
                h1.style.color = colors[Math.floor(Math.random() * colors.length)];
            });
            h1.addEventListener('mouseleave', () => {
                h1.style.color = '#255338';
            });
        });
    </script>


</body>
