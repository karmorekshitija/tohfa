<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&amp;family=Merriweather:wght@300;400;700&amp;family=DM+Sans:wght@400;500;700&amp;family=Cinzel:wght@400;700&amp;family=Space+Mono:wght@400;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-low": "#fff2e1",
                        "inverse-surface": "#362f25",
                        "secondary-container": "#c8e9b8",
                        "on-secondary-fixed": "#062103",
                        "tertiary-fixed": "#ecdcff",
                        "surface-dim": "#e5d8c8",
                        "on-secondary": "#ffffff",
                        "on-error": "#ffffff",
                        "surface-bright": "#fff8f3",
                        "surface-container-highest": "#ede1d1",
                        "on-error-container": "#93000a",
                        "on-tertiary-container": "#e8d6ff",
                        "error": "#ba1a1a",
                        "surface-tint": "#3a684c",
                        "primary-fixed-dim": "#a0d2b0",
                        "on-surface": "#211b11",
                        "on-primary": "#ffffff",
                        "surface-container-high": "#f3e6d6",
                        "surface-variant": "#ede1d1",
                        "on-secondary-container": "#4d6a43",
                        "on-primary-fixed-variant": "#214f36",
                        "tertiary-container": "#70539b",
                        "primary-fixed": "#bceecb",
                        "surface-container-lowest": "#ffffff",
                        "tertiary": "#573b81",
                        "inverse-primary": "#a0d2b0",
                        "secondary-fixed-dim": "#afd0a0",
                        "on-background": "#211b11",
                        "tertiary-fixed-dim": "#d6baff",
                        "primary": "#255338",
                        "secondary-fixed": "#caecbb",
                        "on-primary-container": "#b7e9c6",
                        "secondary": "#49663f",
                        "outline": "#717972",
                        "on-tertiary-fixed-variant": "#54387e",
                        "on-surface-variant": "#414942",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed-variant": "#324e29",
                        "inverse-on-surface": "#fcefde",
                        "outline-variant": "#c1c9c0",
                        "surface": "#fff8f3",
                        "primary-container": "#3d6b4f",
                        "surface-container": "#f9ecdc",
                        "on-tertiary-fixed": "#270550",
                        "background": "#fff8f3",
                        "error-container": "#ffdad6",
                        "on-primary-fixed": "#002110",
                        "ivory-input": "#FCFAF5",
                        "sage-soft": "#c1c9c0",
                        "forest-brand": "#3D6B4F",
                        "violet-focus": "#7B5EA7"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "20px",
                        "gutter": "16px",
                        "margin-desktop": "64px",
                        "xl": "40px",
                        "lg": "24px",
                        "md": "16px",
                        "xs": "4px",
                        "sm": "8px",
                        "unit": "4px"
                    },
                    "fontFamily": {
                        "display-hero": ["Playfair Display"],
                        "data-price": ["Space Mono"],
                        "title-serif": ["Merriweather"],
                        "body-md": ["DM Sans"],
                        "headline-lg-mobile": ["Playfair Display"],
                        "label-caps": ["Cinzel"],
                        "headline-lg": ["Playfair Display"]
                    },
                    "fontSize": {
                        "display-hero": ["48px", {"lineHeight": "56px", "fontWeight": "300"}],
                        "data-price": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                        "title-serif": ["18px", {"lineHeight": "24px", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "400"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "700"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .scrim-overlay {
            background-color: rgba(229, 216, 200, 0.4); /* Neutral cream-tinted overlay */
            backdrop-filter: blur(2px);
        }
        .bottom-sheet {
            box-shadow: 0 -4px 20px rgba(58, 51, 40, 0.08);
            max-width: 375px;
            margin: 0 auto;
        }
        .input-focus-glow {
            box-shadow: 0 0 0 4px rgba(123, 94, 167, 0.05);
        }
        .hand-drawn-underline {
            position: relative;
        }
        .hand-drawn-underline::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 1px;
            background: currentColor;
            opacity: 0.6;
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex items-center justify-center font-body-md">
<!-- Background Mock (Saved Addresses Screen) -->
<div class="fixed inset-0 w-full h-full overflow-hidden pointer-events-none select-none">
<!-- TopNavBar Mock from JSON -->
<header class="w-full top-0 sticky z-50 bg-surface border-b border-outline-variant flex items-center justify-between px-margin-mobile py-md opacity-40">
<h1 class="font-display-hero text-[32px] italic text-primary">Tohfa<span class="text-tertiary">.</span></h1>
<div class="flex gap-md">
<span class="material-symbols-outlined text-primary">search</span>
<span class="material-symbols-outlined text-primary">shopping_bag</span>
</div>
</header>
<main class="p-margin-mobile opacity-40">
<h2 class="font-title-serif text-title-serif mb-lg">Saved Addresses</h2>
<div class="space-y-md">
<div class="p-md bg-white border border-sage-soft rounded-lg flex items-start gap-md">
<span class="material-symbols-outlined text-primary">home</span>
<div>
<p class="font-bold">Home</p>
<p class="text-sm opacity-70">123 Artisan Lane, Craft Village, 90210</p>
</div>
</div>
<div class="p-md bg-white border border-sage-soft rounded-lg flex items-start gap-md">
<span class="material-symbols-outlined text-primary">work</span>
<div>
<p class="font-bold">Work</p>
<p class="text-sm opacity-70">456 Studio Road, Design District, 90211</p>
</div>
</div>
</div>
</main>
</div>
<!-- SCRIM -->
<div class="fixed inset-0 scrim-overlay z-10"></div>
<!-- BOTTOM SHEET CONTAINER -->
<div class="fixed inset-x-0 bottom-0 z-20 flex justify-center items-end">
<div class="bottom-sheet bg-white w-full rounded-t-[24px] relative flex flex-col max-h-[90vh] overflow-hidden">
<!-- HANDLE -->
<div class="w-full flex justify-center pt-sm pb-xs">
<div class="w-12 h-1 bg-sage-soft rounded-full opacity-60"></div>
</div>
<!-- HEADER -->
<div class="px-margin-mobile py-md flex items-center justify-between border-b border-outline-variant/30">
<h2 class="font-headline-lg-mobile text-[20px] italic font-medium text-primary">Add New Address</h2>
<button class="p-xs hover:bg-surface-container-high rounded-full transition-colors">
<span class="material-symbols-outlined text-on-surface-variant">close</span>
</button>
</div>
<!-- SCROLLABLE CONTENT -->
<div class="px-margin-mobile py-lg space-y-lg overflow-y-auto pb-[100px]">
<!-- ADDRESS TYPE CHIPS -->
<div class="space-y-sm">
<label class="font-label-caps text-[10px] text-tertiary-container uppercase tracking-widest block">Address Type</label>
<div class="flex gap-sm">
<button class="px-lg py-sm rounded-full bg-forest-brand text-white font-medium text-sm flex items-center gap-xs shadow-sm">
<span class="material-symbols-outlined text-[18px]">home</span>
                            Home
                        </button>
<button class="px-lg py-sm rounded-full bg-white border border-sage-soft text-on-surface-variant font-medium text-sm flex items-center gap-xs hover:border-forest-brand transition-colors">
<span class="material-symbols-outlined text-[18px]">work</span>
                            Work
                        </button>
<button class="px-lg py-sm rounded-full bg-white border border-sage-soft text-on-surface-variant font-medium text-sm flex items-center gap-xs hover:border-forest-brand transition-colors">
<span class="material-symbols-outlined text-[18px]">more_horiz</span>
                            Other
                        </button>
</div>
</div>
<!-- FORM FIELDS -->
<div class="space-y-md">
<!-- FULL NAME (FOCUSED STATE) -->
<div class="space-y-xs group">
<label class="font-label-caps text-[10px] text-tertiary-container uppercase tracking-widest flex justify-between">
                            Full Name
                            <span class="text-[8px] opacity-50">REQUIRED</span>
</label>
<div class="relative">
<input autofocus="" class="w-full bg-[#f8f6f0] border-2 border-violet-focus px-md py-sm rounded-lg text-body-md focus:outline-none input-focus-glow" type="text" value="Amara Khan">
<div class="absolute right-md top-1/2 -translate-y-1/2">
<div class="w-1.5 h-1.5 rounded-full bg-violet-focus animate-pulse"></div>
</div>
</div>
</div>
<!-- PHONE NUMBER -->
<div class="space-y-xs">
<label class="font-label-caps text-[10px] text-tertiary-container uppercase tracking-widest">Phone Number</label>
<input class="w-full bg-ivory-input border border-sage-soft px-md py-sm rounded-lg text-body-md focus:border-forest-brand focus:ring-0 outline-none transition-all" placeholder="+1 (555) 000-0000" type="tel">
</div>
<!-- STREET ADDRESS -->
<div class="space-y-xs">
<label class="font-label-caps text-[10px] text-tertiary-container uppercase tracking-widest">Street Address</label>
<textarea class="w-full bg-ivory-input border border-sage-soft px-md py-sm rounded-lg text-body-md focus:border-forest-brand focus:ring-0 outline-none transition-all resize-none" placeholder="Building, Street, Area" rows="2"></textarea>
</div>
<div class="grid grid-cols-2 gap-md">
<!-- CITY -->
<div class="space-y-xs">
<label class="font-label-caps text-[10px] text-tertiary-container uppercase tracking-widest">City</label>
<input class="w-full bg-ivory-input border border-sage-soft px-md py-sm rounded-lg text-body-md focus:border-forest-brand focus:ring-0 outline-none transition-all" placeholder="London" type="text">
</div>
<!-- POSTAL CODE -->
<div class="space-y-xs">
<label class="font-label-caps text-[10px] text-tertiary-container uppercase tracking-widest">Postal Code</label>
<input class="w-full bg-ivory-input border border-sage-soft px-md py-sm rounded-lg text-body-md focus:border-forest-brand focus:ring-0 outline-none transition-all" placeholder="E1 6AN" type="text">
</div>
</div>
</div>
<!-- SET AS DEFAULT TOGGLE -->
<div class="flex items-center justify-between py-sm">
<div class="space-y-xs">
<p class="font-title-serif text-sm">Set as default address</p>
<p class="text-xs opacity-60">This will be used for your future orders.</p>
</div>
<div class="w-12 h-6 bg-secondary-container rounded-full relative cursor-pointer">
<div class="absolute right-1 top-1 w-4 h-4 bg-forest-brand rounded-full"></div>
</div>
</div>
</div>
<!-- MASCOT PEEK -->

<!-- CTA SECTION -->
<div class="p-margin-mobile bg-white/80 backdrop-blur-md border-t border-outline-variant/30 sticky bottom-0 z-40">
<button class="w-full bg-forest-brand text-white font-bold py-md rounded-lg hover:bg-opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">save</span>
                    Save Address
                </button>
</div>
</div>
</div>
<!-- Micro-interaction script -->
<script>
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', () => {
                btn.style.transform = 'scale(0.96)';
            });
            btn.addEventListener('mouseup', () => {
                btn.style.transform = 'scale(1)';
            });
        });

        // Simple mock for input interaction
        const inputs = document.querySelectorAll('input, textarea');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                if(!input.classList.contains('border-violet-focus')) {
                    input.style.borderColor = '#3D6B4F';
                }
            });
            input.addEventListener('blur', () => {
                if(!input.classList.contains('border-violet-focus')) {
                    input.style.borderColor = '#c1c9c0';
                }
            });
        });
    </script>


</body></html>
