<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting to Tohfa...</title>
  <script>
    try {
      const userStr = sessionStorage.getItem('tohfa_user');
      if (userStr) {
        const user = JSON.parse(userStr);
        if (user.role === 'seller') {
          window.location.href = '/seller/dashboard.html';
        } else if (user.role === 'admin') {
          window.location.href = '/admin/sellers.html';
        } else {
          window.location.href = '/buyer/home.html';
        }
      } else {
        window.location.href = '/buyer/home.html';
      }
    } catch (e) {
      console.error(e);
      window.location.href = '/buyer/home.html';
    }
  </script>
</head>
<body>
  <p style="font-family: sans-serif; text-align: center; margin-top: 100px; color: #666;">
    Redirecting...
  </p>
</body>
</html>
