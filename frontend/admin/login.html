<style>
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }

        background-color: #fff8f1;

    }

        outline: none;

    }

<body class="botanical-bg font-body-md text-on-surface min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop relative overflow-hidden">

<main class="w-full max-w-[440px] z-10">
    <div class="bg-surface-container-lowest border border-outline-variant p-8 md:p-10 rounded-lg shadow-sm">
        <!-- Logo Section -->
        <header class="text-center mb-8">
            <h1 class="font-headline-lg text-3xl text-primary tracking-tight mb-2">Tohfa</h1>
            <p class="font-label-sm text-xs text-on-surface-variant uppercase tracking-widest font-semibold">Admin Portal</p>
        </header>

        <!-- Form -->
        <form id="admin-login-form" class="space-y-4">
            <div>
                <label for="username-input" class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-1">Username or Email</label>
                <input id="username-input" class="w-full px-4 py-3 bg-surface border border-outline-variant rounded-xl text-sm focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary" placeholder="admin" type="text" required>
            </div>

            <div>
                <label for="password-input" class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-1">Password</label>
                <input id="password-input" class="w-full px-4 py-3 bg-surface border border-outline-variant rounded-xl text-sm focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary" type="password" required>
            </div>

            <!-- Error message -->
            <div id="error-message" class="hidden text-xs text-error font-medium p-3 bg-error-container rounded-lg">
                Invalid admin credentials.
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-primary hover:bg-primary/95 text-on-primary py-3.5 rounded-full text-sm font-semibold transition-all active:scale-[0.98] shadow-md">
                Login as Admin
            </button>
        </form>
    </div>
</main>

<script>
const API_BASE = window.location.origin;

document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const errorMsg = document.getElementById('error-message');
    
    btn.disabled = true;
    btn.textContent = 'Logging in…';
    errorMsg.classList.add('hidden');

    const username = document.getElementById('username-input').value.trim();
    const password = document.getElementById('password-input').value;

    try {
        const res = await fetch(`${API_BASE}/api/admin/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        
        const data = await res.json();
        
        if (res.ok && data.success) {
            sessionStorage.setItem('tohfa_admin_token', data.data.access_token);
            window.location.href = '/admin/sellers.html';
        } else {
            if (res.status === 401) {
                errorMsg.textContent = 'Invalid admin credentials.';
            } else {
                errorMsg.textContent = data.message || 'An error occurred during login.';
            }
            errorMsg.classList.remove('hidden');
            btn.disabled = false;
            btn.textContent = 'Login as Admin';
        }
    } catch (err) {
        console.error('Login error:', err);
        errorMsg.textContent = 'Failed to connect to the server.';
        errorMsg.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Login as Admin';
    }
});
</script>
</body>
</html>
