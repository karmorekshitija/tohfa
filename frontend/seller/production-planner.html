<body class="bg-background font-body-md text-on-surface overflow-hidden watercolor-wash">

<seller-layout active-tab="capacity">
<div class="h-[calc(100vh-10rem)] flex flex-col overflow-hidden">
<!-- HEADERBAR REPLACEMENT -->
<div class="flex flex-col md:flex-row md:items-center md:justify-between gap-md mb-6 flex-shrink-0">
  <div>
    <h1 class="font-headline-lg text-primary text-2xl font-bold">Production Planner</h1>
    <p class="text-on-surface-variant text-sm font-body-md mt-1">Manage your studio bandwidth and festive deadlines</p>
  </div>
  <div class="flex items-center gap-md">
    <button id="set-away-date-btn" class="px-lg py-sm border border-outline bg-white text-primary rounded-lg font-body-md hover:bg-surface-container-low transition-colors active:scale-98">
      Set Away Date
    </button>
    <button id="set-festive-cutoff-btn" class="px-lg py-sm bg-surface-container text-on-secondary-container rounded-lg font-body-md border border-on-secondary-container/20 hover:bg-surface-container-highest transition-colors active:scale-98">
      Set Festive Cutoff
    </button>
  </div>
</div>
<!-- CONTROLS ROW -->
<div class="px-margin-desktop py-md flex items-center justify-between border-b border-outline-variant/30">
<div class="flex items-center gap-lg">
<div class="flex p-1 bg-surface-container rounded-lg">
<button class="px-md py-xs bg-white text-primary font-body-md rounded-md shadow-sm">Week</button>
<button class="px-md py-xs text-on-surface-variant font-body-md hover:text-primary transition-colors">Month</button>
</div>
<div class="flex items-center gap-md font-data-price text-on-surface">
<button id="prev-week" class="material-symbols-outlined text-outline">chevron_left</button>
<span id="week-label" class="text-body-md"></span>
<button id="next-week" class="material-symbols-outlined text-outline">chevron_right</button>
</div>
</div>
<div class="flex items-center gap-md">
<span class="font-body-md text-on-surface-variant">Show batch groups</span>
<button class="w-12 h-6 bg-primary rounded-full relative transition-colors duration-200" id="batch-toggle">
<span class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full transition-transform duration-200"></span>
</button>
</div>
</div>
<!-- 3-PANEL BODY -->
<div class="flex-1 flex overflow-hidden">
<!-- LEFT PANEL: PRODUCT CAPACITY (25% / 3 parts) -->
<section class="w-1/4 border-r border-outline-variant/30 overflow-y-auto px-lg py-xl bg-surface/30">
<div class="space-y-md">
<h2 class="font-label-caps text-on-surface-variant">Product Bandwidth</h2>
<div id="bandwidth-list" class="space-y-md">
    <!-- Dynamic product bandwidth cards -->
</div>
</div>
</section>
<!-- CENTER PANEL: CAPACITY CALENDAR (50% / 6 parts) -->
<section class="flex-1 bg-white overflow-y-auto px-lg py-xl">
<div id="calendar-grid" class="grid grid-cols-7 h-full gap-gutter">
    <!-- Dynamic MON-SUN calendar columns -->
</div>
</section>
<!-- RIGHT PANEL: BATCH VIEW (25% / 3 parts) -->
<section class="w-1/4 border-l border-outline-variant/30 overflow-y-auto px-lg py-xl bg-surface/30">
<div class="space-y-xl">
<h2 class="font-label-caps text-on-surface-variant">Daily Batches</h2>
<div id="batches-list" class="space-y-lg">
    <!-- Dynamic daily batches list -->
</div>
</div>
<!-- Mascot Visual Element -->
<div class="mt-12 flex flex-col items-center justify-center text-center opacity-40 grayscale pointer-events-none">
<img class="w-24 h-24 object-contain rounded-full mb-4" data-alt="A stylized minimalist illustration of a small ceramic figurine on an artisan workbench, surrounded by tiny pottery tools and dried wildflowers." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDBlBms8bEQ2EsfAwTYOk8mtr8-VhpH-3pyZ54rm3294ZSONsnT-au7xGhoC5PGtAHamKRDutG2mptFvb0VfYU7aNXlW24xbQjVlbDLSicGGPYxGakkLW7TRV5pcp6gCAKy-FezlPNkVq9j-DGpmmrO3hDoEFdSH5fedX13adfdkJz6N5-V-eeypajqUGhEkf0DdwOr6kcOXoDMrz1jXaWJTER8peO4QtyUTslnjrL1g6hvGykN04Yyr4dvWnrIpzKWP9ly2dXObBU"/>
<p class="font-label-caps text-[10px]">Slow &amp; Steady Craft</p>
</div>
</section>
</div>
</div>
</seller-layout>

<script>
    const API_BASE_URL = window.location.origin;
    let token = sessionStorage.getItem('access_token') || sessionStorage.getItem('tohfa_access_token');
    let currentWeekStart = getStartOfWeek(new Date());
    let selectedDate = new Date();
    let listings = [];
    let orders = [];

    function getStartOfWeek(d) {
        const date = new Date(d);
        const day = date.getDay();
        const diff = date.getDate() - day + (day === 0 ? -6 : 1);
        return new Date(date.setDate(diff));
    }

    function isSameDay(d1Str, d2Date) {
        if (!d1Str) return false;
        const d1 = new Date(d1Str);
        return d1.getFullYear() === d2Date.getFullYear() &&
               d1.getMonth() === d2Date.getMonth() &&
               d1.getDate() === d2Date.getDate();
    }

    function showToast(msg, type='success') {
        let toast = document.getElementById('toast');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'toast';
            document.body.appendChild(toast);
        }
        toast.className = `fixed bottom-6 right-6 z-[300] flex items-center gap-3 px-5 py-3 rounded-xl shadow-lg text-sm font-medium transition-all transform duration-300 ${
            type === 'success' ? 'bg-[#3D6B4F] text-white' : 'bg-[#BA1A1A] text-white'
        }`;
        toast.innerHTML = `<span class="material-symbols-outlined">${type === 'success' ? 'check_circle' : 'error'}</span><span>${msg}</span>`;
        toast.style.display = 'flex';
        setTimeout(() => toast.style.display = 'none', 3500);
    }

    // ZAI Mode UI Styling sync helper
    function updateZaiUI(enabled) {
        const toggleBtn = document.getElementById('zai-toggle-btn');
        if (toggleBtn) {
            const icon = document.getElementById('zai-toggle-icon');
            if (enabled) {
                if (icon) icon.style.fontVariationSettings = "'FILL' 1";
                toggleBtn.classList.add('text-primary');
            } else {
                if (icon) icon.style.fontVariationSettings = "'FILL' 0";
                toggleBtn.classList.remove('text-primary');
            }
        }
    }

    async function loadData() {
        if (!token) return;
        try {
            // Fetch catalog for left panel
            const catRes = await fetch(`${API_BASE_URL}/api/seller/catalog`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (catRes.ok) {
                const resp = await catRes.json();
                listings = (resp.data?.listings || resp.listings || []).filter(l => l.status === 'active');
            }

            // Fetch orders for calendar and batches
            const ordRes = await fetch(`${API_BASE_URL}/api/seller/orders?per_page=100`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (ordRes.ok) {
                const resp = await ordRes.json();
                orders = resp.data?.orders || resp.orders || [];
            }

            renderBandwidth();
            renderCalendar();
            renderBatches();
        } catch (err) {
            console.error('Error loading production planner data:', err);
            showToast('Failed to load planner data.', 'error');
        }
    }

    async function updateBandwidth(listingId, fields) {
        try {
            const res = await fetch(`${API_BASE_URL}/api/seller/listings/${listingId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(fields)
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.message || 'Failed to update capacity');
            showToast('Capacity limits updated!', 'success');
            loadData();
        } catch (err) {
            showToast(err.message, 'error');
        }
    }

    function renderBandwidth() {
        const list = document.getElementById('bandwidth-list');
        list.innerHTML = '';
        if (listings.length === 0) {
            list.innerHTML = '<p class="text-xs text-on-surface-variant italic py-4">No active listings found.</p>';
            return;
        }

        listings.forEach(l => {
            const card = document.createElement('div');
            card.className = 'bg-white border border-outline-variant/30 rounded-xl p-md shadow-sm space-y-md';
            
            const isCustom = l.primary_medium ? 'CUSTOM' : 'PRE-MADE';
            
            card.innerHTML = `
                <div class="flex justify-between items-start">
                    <div>
                        <h3 class="font-title-serif text-primary font-bold">${l.title}</h3>
                        <span class="text-[10px] font-label-caps px-2 py-0.5 bg-secondary-container/30 text-secondary rounded-full">${isCustom}</span>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-sm">
                    <div class="space-y-1">
                        <label class="text-[10px] font-label-caps text-outline uppercase">Daily Slots</label>
                        <input class="w-full bg-surface-container-low border-none rounded font-data-price text-center py-1 focus:ring-1 focus:ring-primary" type="number" min="0" value="${l.daily_max_slots || 0}" id="daily-${l.listing_id || l.id}"/>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-label-caps text-outline uppercase">Weekly Cap</label>
                        <input class="w-full bg-surface-container-low border-none rounded font-data-price text-center py-1 focus:ring-1 focus:ring-primary" type="number" min="0" value="${l.weekly_cap || 0}" id="weekly-${l.listing_id || l.id}"/>
                    </div>
                </div>
            `;

            const dailyInput = card.querySelector(`#daily-${l.listing_id || l.id}`);
            const weeklyInput = card.querySelector(`#weekly-${l.listing_id || l.id}`);

            dailyInput.addEventListener('change', () => {
                updateBandwidth(l.listing_id || l.id, { daily_max_slots: parseInt(dailyInput.value) || 0 });
            });
            weeklyInput.addEventListener('change', () => {
                updateBandwidth(l.listing_id || l.id, { weekly_cap: parseInt(weeklyInput.value) || 0 });
            });

            list.appendChild(card);
        });
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '';

        // Render week header range label
        const weekDates = [];
        const dayNames = ['MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT', 'SUN'];
        for (let i = 0; i < 7; i++) {
            const d = new Date(currentWeekStart);
            d.setDate(currentWeekStart.getDate() + i);
            weekDates.push(d);
        }

        const labelStart = weekDates[0].toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        const labelEnd = weekDates[6].toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        document.getElementById('week-label').textContent = `${labelStart} — ${labelEnd}`;

        weekDates.forEach((date, index) => {
            const dayName = dayNames[index];
            const dayNum = date.getDate();
            const isSelected = isSameDay(selectedDate.toISOString(), date);
            const isToday = isSameDay(new Date().toISOString(), date);

            const col = document.createElement('div');
            col.className = `flex flex-col gap-md p-2 rounded-xl transition-all cursor-pointer ${
                isSelected ? 'bg-secondary-container/10 border-2 border-primary' : 'hover:bg-surface-container-low'
            } ${isToday ? 'relative ring-1 ring-primary/40' : ''}`;

            col.innerHTML = `
                <div class="text-center pb-md border-b border-outline-variant/20">
                    <span class="font-label-caps text-outline text-[10px]">${dayName}</span>
                    <p class="font-data-price text-on-surface font-bold text-lg">${dayNum}</p>
                </div>
                <div class="flex-grow space-y-sm" id="cal-slots-${index}">
                    <!-- Slots will go here -->
                </div>
            `;

            col.addEventListener('click', () => {
                selectedDate = date;
                renderCalendar();
                renderBatches();
            });

            const slotsDiv = col.querySelector(`#cal-slots-${index}`);
            
            // Loop through active listings and compute slot filled counts
            listings.forEach(l => {
                const lid = l.listing_id || l.id;
                const relevantOrders = orders.filter(o => 
                    (o.listing_id === lid) && 
                    !['cancelled', 'rto', 'delivered'].includes(o.status) &&
                    isSameDay(o.deadline_at, date)
                );

                const filled = relevantOrders.length;
                const cap = l.daily_max_slots || 0;
                
                const slotBox = document.createElement('div');
                if (cap > 0 && filled >= cap) {
                    slotBox.className = 'bg-primary text-white p-2 rounded-lg relative overflow-hidden text-xs';
                    slotBox.innerHTML = `
                        <p class="text-[9px] font-label-caps opacity-60 mb-0.5">${l.title.slice(0, 8).toUpperCase()}</p>
                        <p class="font-data-price font-bold">${filled}/${cap}</p>
                        <span class="absolute top-1 right-1 font-label-caps text-[7px] bg-white text-primary px-0.5 rounded-sm">FULL</span>
                    `;
                } else {
                    slotBox.className = 'bg-surface-bright border border-outline-variant/20 p-2 rounded-lg text-xs';
                    slotBox.innerHTML = `
                        <p class="text-[9px] font-label-caps text-outline-variant mb-0.5">${l.title.slice(0, 8).toUpperCase()}</p>
                        <p class="font-data-price text-primary font-medium">${filled}/${cap || '∞'}</p>
                    `;
                }
                slotsDiv.appendChild(slotBox);
            });

            grid.appendChild(col);
        });
    }

    function renderBatches() {
        const list = document.getElementById('batches-list');
        list.innerHTML = '';

        // Display current date header
        const formattedDate = selectedDate.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
        
        // Filter orders due on selected date
        const dayOrders = orders.filter(o => 
            !['cancelled', 'rto', 'delivered'].includes(o.status) &&
            isSameDay(o.deadline_at, selectedDate)
        );

        const summaryHeader = document.createElement('div');
        summaryHeader.className = 'flex items-center justify-between border-b border-outline-variant/30 pb-2 mb-4';
        summaryHeader.innerHTML = `
            <h3 class="font-title-serif text-on-surface font-bold text-md">${formattedDate}</h3>
            <span class="font-data-price text-tertiary">${dayOrders.length} Orders</span>
        `;
        list.appendChild(summaryHeader);

        if (dayOrders.length === 0) {
            list.innerHTML += '<p class="text-xs text-on-surface-variant italic py-6 text-center">No production orders due on this day.</p>';
            return;
        }

        // Group by product
        const groups = {};
        dayOrders.forEach(o => {
            if (!groups[o.listing_id]) {
                groups[o.listing_id] = {
                    title: o.product_title || 'Craft Item',
                    orders: []
                };
            }
            groups[o.listing_id].orders.push(o);
        });

        Object.keys(groups).forEach(listingId => {
            const group = groups[listingId];
            const card = document.createElement('div');
            card.className = 'bg-white border border-outline-variant/30 rounded-xl p-md shadow-sm ink-texture mb-4';
            
            const estHrs = (group.orders.length * 0.5).toFixed(1);
            
            card.innerHTML = `
                <div class="flex justify-between mb-sm">
                    <span class="font-label-caps text-xs text-primary font-bold">BATCH #${listingId}</span>
                    <span class="font-data-price text-xs text-outline">~${estHrs} hrs</span>
                </div>
                <h4 class="font-title-serif text-on-surface mb-2 font-bold">${group.title}</h4>
                <div class="flex flex-wrap gap-xs mb-md">
                    ${group.orders.map(o => `
                        <span class="font-data-price text-[10px] px-2 py-0.5 bg-surface-container rounded">${o.order_ref}</span>
                    `).join('')}
                </div>
                <button class="w-full py-sm border border-outline text-on-surface-variant font-body-md rounded-lg hover:bg-primary hover:text-white hover:border-primary transition-all active:scale-95 flex items-center justify-center gap-2 font-bold text-xs" id="btn-complete-${listingId}">
                    <span class="material-symbols-outlined text-[18px]">check_circle</span>
                    Mark batch complete
                </button>
            `;

            const btn = card.querySelector(`#btn-complete-${listingId}`);
            btn.addEventListener('click', async () => {
                btn.disabled = true;
                btn.textContent = 'Updating...';
                try {
                    // Update all orders in loop
                    for (const o of group.orders) {
                        await fetch(`${API_BASE_URL}/api/seller/orders/${o.id}/status`, {
                            method: 'PATCH',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}`
                            },
                            body: JSON.stringify({ status: 'packed' })
                        });
                    }
                    showToast('Batch marked as completed (packed)!', 'success');
                    loadData();
                } catch (err) {
                    showToast('Failed to complete batch.', 'error');
                    btn.disabled = false;
                    btn.innerHTML = `<span class="material-symbols-outlined text-[18px]">check_circle</span> Mark batch complete`;
                }
            });

            list.appendChild(card);
        });
    }

    document.addEventListener('DOMContentLoaded', async () => {
        if (!token) { window.location.href = '/auth/login.html'; return; }

        // Role verification
        try {
            const pr = await fetch(`${API_BASE_URL}/api/profile/me`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (!pr.ok) throw new Error();
            const pd = await pr.json();
            const u = pd.data || pd;
            if (u.role !== 'seller') { window.location.href = '/buyer/profile.html'; return; }
        } catch {
            sessionStorage.clear();
            window.location.href = '/auth/login.html';
            return;
        }

        // Init load ZAI Mode
        const zaiEnabled = localStorage.getItem('zai_mode') === 'true';
        updateZaiUI(zaiEnabled);

        // ZAI toggle button click
        const toggleBtn = document.getElementById('zai-toggle-btn');
        if (toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                const nextEnabled = !(localStorage.getItem('zai_mode') === 'true');
                localStorage.setItem('zai_mode', nextEnabled ? 'true' : 'false');
                
                // Sync with backend
                fetch(`${API_BASE_URL}/api/seller/zai-mode`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ enabled: nextEnabled })
                })
                .then(res => res.json())
                .then(data => {
                    if (data && data.success) {
                        updateZaiUI(nextEnabled);
                    }
                })
                .catch(err => console.error("Error setting ZAI mode:", err));
            });
        }

        // Week pagination chevrons
        document.getElementById('prev-week').addEventListener('click', () => {
            currentWeekStart.setDate(currentWeekStart.getDate() - 7);
            renderCalendar();
        });
        document.getElementById('next-week').addEventListener('click', () => {
            currentWeekStart.setDate(currentWeekStart.getDate() + 7);
            renderCalendar();
        });

        // View Store
        const viewStoreBtn = document.getElementById('view-store-btn');
        if (viewStoreBtn) {
            viewStoreBtn.addEventListener('click', () => {
                fetch(`${API_BASE_URL}/api/seller/profile`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                })
                .then(res => res.json())
                .then(data => {
                    const profileData = data.data || data;
                    if (profileData && profileData.handle) {
                        window.location.href = `/store/${profileData.handle}`;
                    } else {
                        window.location.href = '/';
                    }
                })
                .catch(err => {
                    console.error('Error fetching seller profile:', err);
                    window.location.href = '/';
                });
            });
        }

        // Logout
        const logoutBtn = document.getElementById('logout-btn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', () => {
                const refresh = sessionStorage.getItem('tohfa_refresh_token') || sessionStorage.getItem('refresh_token');
                if (token && refresh) {
                    fetch('/api/auth/logout', { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`}, body:JSON.stringify({refresh_token:refresh}) }).catch(()=>{});
                }
                sessionStorage.clear(); window.location.href = '/auth/login.html';
            });
        }

        // Set Away Date click handler
        const setAwayDateBtn = document.getElementById('set-away-date-btn');
        if (setAwayDateBtn) {
            setAwayDateBtn.addEventListener('click', async () => {
                const awayDate = prompt("Enter away dates (e.g. 2026-06-15 to 2026-06-20):");
                if (awayDate === null) return;
                try {
                    const res = await fetch(`${API_BASE_URL}/api/seller/store-config`, {
                        method: 'PATCH',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ away_dates: awayDate.trim() })
                    });
                    const resp = await res.json();
                    if (!res.ok) throw new Error(resp.message || "Failed to update away date");
                    showToast("Away date updated successfully!", "success");
                } catch (err) {
                    showToast(err.message, "error");
                }
            });
        }

        // Set Festive Cutoff click handler
        const setFestiveCutoffBtn = document.getElementById('set-festive-cutoff-btn');
        if (setFestiveCutoffBtn) {
            setFestiveCutoffBtn.addEventListener('click', async () => {
                const festiveCutoff = prompt("Enter festive cutoff date (e.g. 2026-12-20):");
                if (festiveCutoff === null) return;
                try {
                    const res = await fetch(`${API_BASE_URL}/api/seller/store-config`, {
                        method: 'PATCH',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ festive_cutoff: festiveCutoff.trim() })
                    });
                    const resp = await res.json();
                    if (!res.ok) throw new Error(resp.message || "Failed to update festive cutoff");
                    showToast("Festive cutoff date updated successfully!", "success");
                } catch (err) {
                    showToast(err.message, "error");
                }
            });
        }

        // Initial Data Fetch
        loadData();
    });
</script>
</body>
</html>
