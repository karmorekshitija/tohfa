<body class="bg-[#FFFFFF] text-on-surface font-body-md min-h-screen flex flex-col">
<!-- TopNavBar -->
<!-- Standardised Top Navigation Bar (Task 57) -->

  <!-- Brand Logo (Task 59) -->
  <div class="flex items-center flex-1">
    <a class="font-['Playfair_Display'] text-[32px] italic text-[#255338] select-none" href="/">
      Tohfa<span class="text-[#D4AF37]">.</span>
    </a>
  </div>
  
  <!-- Navigation Links -->
  <nav class="hidden md:flex items-center justify-center gap-xl h-full">
    <!-- Home -->
    <a href="/" class="flex items-center gap-xs text-[#414942] hover:text-[#255338] transition-colors h-full px-1 font-['DM_Sans'] text-[16px] font-normal">
      <span class="material-symbols-outlined text-[20px]">home</span>
      <span>Home</span>
    </a>
    <!-- Category (Discover) -->
    <a href="/category" class="flex items-center gap-xs text-[#414942] hover:text-[#255338] transition-colors h-full px-1 font-['DM_Sans'] text-[16px] font-normal">
      <span class="material-symbols-outlined text-[20px]">search</span>
      <span>Category</span>
    </a>
    <!-- Reels -->
    <a href="/reels" class="flex items-center gap-xs text-[#414942] hover:text-[#255338] transition-colors h-full px-1 font-['DM_Sans'] text-[16px] font-normal">
      <span class="material-symbols-outlined text-[20px]">movie</span>
      <span>Reels</span>
    </a>
    <!-- Profile -->
    <a href="/profile" class="flex items-center gap-xs text-[#414942] hover:text-[#255338] transition-colors h-full px-1 font-['DM_Sans'] text-[16px] font-normal">
      <span class="material-symbols-outlined text-[20px]">person</span>
      <span>Profile</span>
    </a>
  </nav>
  
  <!-- Right side items -->
  <div class="flex items-center justify-end flex-1 gap-lg">
    <button class="text-[#255338] p-2 hover:bg-[#C1C9C0]/20 rounded-full active:scale-95 duration-200 transition-all">
      <span class="material-symbols-outlined">search</span>
    </button>
    <a href="/cart" class="text-[#255338] p-2 hover:bg-[#C1C9C0]/20 rounded-full active:scale-95 duration-200 transition-all">
      <span class="material-symbols-outlined">favorite</span>
    </a>
    <button class="text-[#255338] p-2 hover:bg-[#C1C9C0]/20 rounded-full active:scale-95 duration-200 transition-all">
      <span class="material-symbols-outlined">notifications</span>
    </button>
    <!-- Profile Avatar (Task 58) -->
    <a href="/profile" class="w-10 h-10 rounded-full bg-[#3D6B4F] flex items-center justify-center text-white font-bold border border-[#C1C9C0] text-sm overflow-hidden flex-shrink-0 cursor-pointer flex items-center justify-center" >
      A
    </a>
  </div>
</header>
<!-- Main Content -->
<main class="flex-grow flex flex-col items-center py-xl px-margin-mobile md:px-margin-desktop">
<div class="w-full max-w-4xl bg-surface p-lg md:p-xl rounded-xl relative shadow-sm border border-outline-variant/30">
<!-- Close Button -->
<button aria-label="Close" class="absolute top-lg right-lg text-outline hover:text-primary transition-colors p-2">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<!-- Header -->
<header class="mb-xl text-center md:text-left">
<h1 class="font-headline-lg text-headline-lg text-primary">Share a make</h1>
<p class="text-on-surface-variant mt-xs">Chronicle your artisan journey from raw material to masterpiece.</p>
</header>
<div class="grid grid-cols-1 md:grid-cols-2 gap-xl">
<!-- Left Column: Media & Upload -->
<div class="space-y-lg">
<!-- Upload Zone (Default State) -->
<div class="relative group cursor-pointer aspect-[9/16] bg-surface-container-low border-2 border-dashed border-outline-variant rounded-xl flex flex-col items-center justify-center p-xl transition-all hover:border-primary" id="upload-zone">
<div class="absolute inset-0 artisan-texture pointer-events-none"></div>
<div class="bg-surface-container-highest/50 rounded-full p-lg mb-md">
<span class="material-symbols-outlined text-primary text-[48px]" data-icon="movie_edit">movie_edit</span>
</div>
<p class="font-title-serif text-title-serif text-primary mb-sm">Tap to record or upload</p>
<p class="text-on-surface-variant text-sm text-center max-w-[200px]">Up to 60 seconds · max 30 MB · MP4 / MOV / WebM</p>
</div>
<input type="file" id="input-video" class="hidden" accept="video/*">
<!-- Uploading State (Hidden) -->
<div class="aspect-[9/16] bg-surface-container-low border border-outline-variant rounded-xl flex flex-col items-center justify-center p-xl hidden" id="uploading-state">
<div class="relative flex items-center justify-center mb-md">
<svg class="w-32 h-32">
<circle class="text-outline-variant" cx="64" cy="64" fill="transparent" r="50" stroke="currentColor" stroke-width="4"></circle>
<circle class="text-primary progress-ring__circle" cx="64" cy="64" fill="transparent" r="50" stroke="currentColor" stroke-dasharray="314.159" stroke-dashoffset="314.159" stroke-linecap="round" stroke-width="4"></circle>
</svg>
<span class="absolute font-data-price text-data-price text-primary">0%</span>
</div>
<p class="font-title-serif text-primary">Spinning the thread...</p>
</div>
<!-- Post-Upload Preview (Hidden) -->
<div class="relative aspect-[9/16] rounded-xl overflow-hidden group hidden" id="preview-state">
<video id="video-preview" class="w-full h-full object-cover" src="" controls></video>
<div class="absolute inset-0 bg-black/20 pointer-events-none"></div>
<div class="absolute bottom-0 left-0 right-0 p-md bg-gradient-to-t from-black/60 to-transparent pointer-events-none">
<div class="flex justify-between items-center pointer-events-auto">
<span class="font-data-price text-data-price text-white" id="video-duration">0:00</span>
<button class="text-tertiary-fixed font-bold hover:underline transition-all" id="replace-video-btn">Replace</button>
</div>
</div>
</div>
</div>
<!-- Right Column: Details -->
<div class="flex flex-col space-y-lg">
<!-- Caption Section -->
<div class="space-y-sm">
<label class="font-title-serif text-primary block">Caption your creation</label>
<div class="relative">
<textarea class="w-full h-32 bg-background border border-outline-variant rounded-lg p-md focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all resize-none" placeholder="Share the story behind this piece..."></textarea>
<span class="absolute bottom-sm right-sm font-data-price text-[12px] text-outline">0/200</span>
</div>
</div>
<!-- Link Product Section -->
<div class="space-y-sm flex-grow">
<label class="font-title-serif text-primary flex items-center">
                            Link a product <span class="text-error ml-1">*</span>
</label>
<div class="relative mb-sm">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline" data-icon="search">search</span>
<input class="w-full pl-lg pr-md py-sm bg-background border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-primary" placeholder="Search your studio..." type="text">
</div>
<div id="product-list-container" class="space-y-sm max-h-[280px] overflow-y-auto custom-scrollbar pr-xs">
<!-- Dynamic products loaded here -->
</div>
</div>
<!-- CTA Button -->
<button id="post-reel-btn" class="w-full bg-primary text-on-primary py-md rounded-lg font-bold shadow-sm hover:opacity-90 active:scale-95 transition-all flex items-center justify-center space-x-sm">
<span class="material-symbols-outlined" data-icon="send">send</span>
<span id="post-reel-label">Post reel</span>
</button>
</div>
</div>
</div>
</main>
<!-- Footer -->
<footer class="w-full bg-surface-container-low dark:bg-surface-container-high border-t border-outline-variant">

</footer>
<script>
        const API_BASE = window.location.origin;

        document.addEventListener('DOMContentLoaded', async () => {
            const token = sessionStorage.getItem('tohfa_access_token');
            if (!token) {
                window.location.href = '/auth/login.html';
                return;
            }

            // Load seller listings for product linking
            const productContainer = document.getElementById('product-list-container');
            const searchInput = document.querySelector('input[placeholder="Search your studio..."]');
            let listings = [];
            let selectedListings = new Set();

            try {
                const res = await fetch(`${API_BASE}/api/seller/listings?limit=100`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.status === 401 || res.status === 403) {
                    sessionStorage.clear();
                    window.location.href = '/auth/login.html';
                    return;
                }
                if (res.ok) {
                    const resp = await res.json();
                    listings = (resp.data?.listings || resp.listings || []).filter(l => l.status === 'active');
                    renderProducts(listings);
                }
            } catch (err) {
                console.error('Failed to load listings:', err);
            }

            function renderProducts(items) {
                productContainer.innerHTML = '';
                if (items.length === 0) {
                    productContainer.innerHTML = '<p class="text-xs text-on-surface-variant/70 text-center py-4">No active listings found.</p>';
                    return;
                }

                items.forEach(l => {
                    const price = (l.price_paise / 100).toFixed(2);
                    const isSelected = selectedListings.has(l.listing_id || l.id);
                    const div = document.createElement('div');
                    div.className = `product-item flex items-center p-sm border ${isSelected ? 'border-2 border-primary bg-primary-container/10' : 'border-outline-variant'} rounded-lg bg-surface hover:bg-surface-container-low cursor-pointer transition-all active:scale-95 mb-2`;
                    div.dataset.id = l.listing_id || l.id;
                    div.dataset.title = l.title;

                    div.innerHTML = `
                        <img class="w-12 h-12 rounded object-cover" src="${l.cover_photo_url || 'https://ui-avatars.com/api/?name=Product'}" alt="${l.title}">
                        <div class="ml-sm flex-grow">
                            <p class="font-title-serif text-[14px] text-primary">${l.title}</p>
                            <p class="font-data-price text-[13px] text-gold">₹${price}</p>
                        </div>
                        <span class="material-symbols-outlined select-icon ${isSelected ? 'text-primary' : 'text-outline-variant'}">
                            ${isSelected ? 'check_circle' : 'radio_button_unchecked'}
                        </span>
                    `;

                    div.addEventListener('click', () => {
                        const lid = l.listing_id || l.id;
                        const icon = div.querySelector('.select-icon');
                        if (selectedListings.has(lid)) {
                            selectedListings.delete(lid);
                            div.className = "product-item flex items-center p-sm border border-outline-variant rounded-lg bg-surface hover:bg-surface-container-low cursor-pointer transition-all active:scale-95 mb-2";
                            icon.textContent = "radio_button_unchecked";
                            icon.className = "material-symbols-outlined text-outline-variant select-icon";
                        } else {
                            selectedListings.add(lid);
                            div.className = "product-item flex items-center p-sm border-2 border-primary rounded-lg bg-primary-container/10 cursor-pointer transition-all mb-2";
                            icon.textContent = "check_circle";
                            icon.className = "material-symbols-outlined text-primary select-icon";
                        }
                    });

                    productContainer.appendChild(div);
                });
            }

            // Local Search filtering
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    const query = e.target.value.toLowerCase().trim();
                    const filtered = listings.filter(l => l.title.toLowerCase().includes(query));
                    renderProducts(filtered);
                });
            }

            // Video Upload inputs and previews
            const inputVideo = document.getElementById('input-video');
            const uploadZone = document.getElementById('upload-zone');
            const uploadingState = document.getElementById('uploading-state');
            const previewState = document.getElementById('preview-state');
            const videoPreview = document.getElementById('video-preview');
            const replaceVideoBtn = document.getElementById('replace-video-btn');
            const videoDuration = document.getElementById('video-duration');

            let videoFile = null;

            uploadZone.addEventListener('click', () => {
                inputVideo.click();
            });

            replaceVideoBtn.addEventListener('click', () => {
                inputVideo.click();
            });

            inputVideo.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;

                // Size check: max 30MB
                if (file.size > 30 * 1024 * 1024) {
                    alert('Video file size exceeds 30 MB limit.');
                    return;
                }

                videoFile = file;

                // Show uploading simulation (micro-animation requested by design system)
                uploadZone.classList.add('hidden');
                previewState.classList.add('hidden');
                uploadingState.classList.remove('hidden');

                // Progress bar simulation
                const progressVal = uploadingState.querySelector('.font-data-price');
                const progressCircle = uploadingState.querySelector('.progress-ring__circle');
                let progress = 0;
                const progressInterval = setInterval(() => {
                    progress += 10;
                    if (progressVal) progressVal.textContent = `${progress}%`;
                    if (progressCircle) {
                        const offset = 314.159 - (314.159 * progress) / 100;
                        progressCircle.style.strokeDashoffset = offset;
                    }
                    if (progress >= 100) {
                        clearInterval(progressInterval);
                        uploadingState.classList.add('hidden');
                        previewState.classList.remove('hidden');

                        const videoUrl = URL.createObjectURL(file);
                        videoPreview.src = videoUrl;
                        
                        videoPreview.onloadedmetadata = () => {
                            const mins = Math.floor(videoPreview.duration / 60);
                            const secs = Math.floor(videoPreview.duration % 60);
                            videoDuration.textContent = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                        };
                    }
                }, 150);
            });

            // Caption character counter
            const textarea = document.querySelector('textarea');
            const counter = document.querySelector('.absolute.bottom-sm.right-sm');
            textarea.addEventListener('input', (e) => {
                const length = e.target.value.length;
                counter.textContent = `${length}/200`;
                if (length > 200) {
                    counter.classList.add('text-error');
                } else {
                    counter.classList.remove('text-error');
                }
            });

            // Post reel form submission
            const postReelBtn = document.getElementById('post-reel-btn');
            const postReelLabel = document.getElementById('post-reel-label');

            postReelBtn.addEventListener('click', async () => {
                if (!videoFile) {
                    alert('Please select or upload a video reel first.');
                    return;
                }
                if (selectedListings.size === 0) {
                    alert('Please link at least one product.');
                    return;
                }

                const captionText = textarea.value.trim();
                if (captionText.length > 200) {
                    alert('Caption cannot exceed 200 characters.');
                    return;
                }

                postReelBtn.disabled = true;
                postReelLabel.textContent = 'Posting reel...';

                const formData = new FormData();
                formData.append('video', videoFile);
                formData.append('caption', captionText);
                formData.append('tagged_listing_ids', JSON.stringify(Array.from(selectedListings)));
                formData.append('share_to_feed', 'true');
                formData.append('share_to_profile', 'true');

                try {
                    const res = await fetch(`${API_BASE}/api/seller/reels`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        },
                        body: formData
                    });

                    const data = await res.json();
                    if (!res.ok) {
                        throw new Error(data.message || 'Failed to post reel');
                    }

                    // Redirect to success page
                    window.location.href = '/seller/reel-upload-success.html';
                } catch (err) {
                    console.error('Failed to post reel:', err);
                    alert(err.message || 'Failed to post reel. Please try again.');
                    postReelBtn.disabled = false;
                    postReelLabel.textContent = 'Post reel';
                }
            });
        });
    </script>


</body>
