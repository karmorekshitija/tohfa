<script type="module">
    import apiClient from '/src/utils/apiClient.js';
    import { formatPaise } from '/src/utils/currency.js';
    import { logout } from '/src/utils/auth.js';

    let reels = [];
    let currentIndex = 0;
    let nextCursor = null;
    let hasMore = true;
    let isLoading = false;
    let isLoggedIn = false;
    
    // Comments state
    let commentsCursor = null;
    let commentsHasMore = false;
    let isLoadingComments = false;

    async function checkAuthState() {
        const token = sessionStorage.getItem('tohfa_access_token');
        const authContainer = document.getElementById('auth-buttons');
        const dashboardLink = document.getElementById('navbar-dashboard-link');
        
        if (token) {
            isLoggedIn = true;
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const payload = JSON.parse(window.atob(base64));
                
                let avatarUrl = null;
                try {
                    const res = await apiClient.get('/profile/me');
                    if (res.data && res.data.success) {
                        avatarUrl = res.data.data.avatar_url;
                    }
                } catch (err) {
                    console.error("Failed to fetch profile avatar:", err);
                }
                
                if (payload.role === 'seller') {
                    if (dashboardLink) {
                        dashboardLink.innerText = 'Seller Dashboard';
                        dashboardLink.href = '/seller/dashboard.html';
                    }
                } else {
                    if (dashboardLink) {
                        dashboardLink.innerText = 'Profile';
                        dashboardLink.href = 'profile.html';
                    }
                }

                let profileHtml = '';
                if (avatarUrl) {
                    profileHtml = `<img src="${avatarUrl}" alt="Profile" class="w-[28px] h-[28px] rounded-full border border-[#C5D6BC] object-cover cursor-pointer" onclick="window.location.href='profile.html'"/>`;
                } else {
                    profileHtml = `<span class="material-symbols-outlined cursor-pointer" style="font-size: 28px; color: #3D6B4F; font-variation-settings: 'FILL' 0, 'wght' 300;" onclick="window.location.href='profile.html'">account_circle</span>`;
                }

                if (authContainer) {
                    authContainer.innerHTML = `
                        <div class="flex items-center gap-4">
                            ${profileHtml}
                            <button id="btn-logout" class="text-secondary hover:text-primary text-xs font-semibold uppercase">Logout</button>
                        </div>
                    `;
                    document.getElementById('btn-logout').addEventListener('click', logout);
                }
            } catch(e) {
                console.error("Failed to parse token:", e);
                logout();
            }
        } else {
            isLoggedIn = false;
            if (authContainer) {
                authContainer.innerHTML = `
                    <a href="/auth/login.html" class="text-secondary hover:text-primary text-xs font-semibold uppercase mr-2">Login</a>
                    <a href="/auth/signup-buyer.html" class="bg-primary text-background px-4 py-1.5 text-xs font-semibold rounded-full hover:bg-primary-fixed-dim transition-all uppercase">Register</a>
                `;
            }
        }
    }

    async function fetchReels(reset = false) {
        if (isLoading) return;
        isLoading = true;
        try {
            let url = '/reels/feed?limit=10';
            if (nextCursor && !reset) {
                url += `&cursor=${nextCursor}`;
            }
            const res = await apiClient.get(url);
            if (res.data && res.data.success) {
                const data = res.data.data;
                nextCursor = data.next_cursor;
                hasMore = data.has_more;
                if (reset) {
                    reels = data.reels || [];
                } else {
                    reels = [...reels, ...(data.reels || [])];
                }

                // Rearrange if specific reel id was provided in url
                const urlParams = new URLSearchParams(window.location.search);
                const targetId = parseInt(urlParams.get('id'), 10);
                if (reset && targetId) {
                    const idx = reels.findIndex(r => r.id === targetId);
                    if (idx > -1) {
                        const targetReel = reels.splice(idx, 1)[0];
                        reels.unshift(targetReel);
                    }
                }
                
                if (reels.length > 0) {
                    displayReel(currentIndex);
                } else {
                    showEmptyState();
                }
            }
        } catch (e) {
            console.error("Error fetching reels:", e);
        } finally {
            isLoading = false;
        }
    }

    function showEmptyState() {
        document.getElementById('reel-caption').innerText = "No reels available.";
        document.getElementById('reel-thumbnail').src = "https://placehold.co/400x700/f4ede3/516447?text=No+Reels";
        document.getElementById('reel-video').classList.add('hidden');
        document.getElementById('reel-thumbnail').classList.remove('hidden');
    }

    function displayReel(index) {
        if (index < 0 || index >= reels.length) return;
        currentIndex = index;
        const reel = reels[index];

        // Update Prev/Next buttons
        document.getElementById('btn-prev-reel').disabled = (index === 0);
        document.getElementById('btn-next-reel').disabled = (index === reels.length - 1 && !hasMore);

        // If close to end, fetch more
        if (index === reels.length - 2 && hasMore) {
            fetchReels(false);
        }

        // Setup Media
        const videoEl = document.getElementById('reel-video');
        const thumbEl = document.getElementById('reel-thumbnail');
        
        if (reel.video_url) {
            videoEl.src = reel.video_url;
            videoEl.classList.remove('hidden');
            videoEl.load();
            videoEl.play().catch(err => {
                console.log("Autoplay blocked or failed:", err);
            });
            thumbEl.classList.add('hidden');
        } else {
            videoEl.classList.add('hidden');
            videoEl.src = '';
            thumbEl.classList.remove('hidden');
        }
        
        thumbEl.src = reel.thumbnail_url || 'https://placehold.co/400x700/f4ede3/516447?text=Artisan+Reel';

        // Update Details
        document.getElementById('reel-caption').innerText = reel.caption || '';
        document.getElementById('reel-seller-name').innerText = reel.seller?.seller_name || 'Artisan';
        
        const avatarEl = document.getElementById('reel-seller-avatar');
        if (reel.seller?.avatar_url) {
            avatarEl.innerHTML = `<img src="${reel.seller.avatar_url}" alt="Avatar" class="w-full h-full object-cover"/>`;
        } else {
            avatarEl.innerHTML = (reel.seller?.seller_name || 'A').substring(0,1).toUpperCase();
        }

        document.getElementById('reel-seller-info').onclick = () => {
            if (reel.seller?.id) {
                window.location.href = `profile.html?id=${reel.seller.id}`;
            }
        };

        // Likes & Saves
        updateLikeUI(reel.is_liked, reel.like_count);
        updateSaveUI(reel.is_saved);
        document.getElementById('comment-count').innerText = reel.comment_count || 0;

        // Linked Product
        const prodCard = document.getElementById('linked-product-card');
        if (reel.linked_product) {
            document.getElementById('product-name').innerText = reel.linked_product.name;
            document.getElementById('product-price').innerText = formatPaise(reel.linked_product.price_paise);
            document.getElementById('product-img').src = reel.thumbnail_url || 'https://placehold.co/100x100/f4ede3/516447?text=Product';
            prodCard.classList.remove('hidden');
            prodCard.onclick = () => {
                window.location.href = `product.html?id=${reel.linked_product.id}`;
            };
        } else {
            prodCard.classList.add('hidden');
            prodCard.onclick = null;
        }

        // Close comments drawer if open
        closeComments();
    }

    function updateLikeUI(isLiked, count) {
        const icon = document.getElementById('like-icon');
        const countText = document.getElementById('like-count');
        countText.innerText = count >= 1000 ? (count / 1000).toFixed(1) + 'k' : count;
        if (isLiked) {
            icon.style.fontVariationSettings = "'FILL' 1";
            icon.style.color = '#ba1a1a';
        } else {
            icon.style.fontVariationSettings = "'FILL' 0";
            icon.style.color = '#ffffff';
        }
    }

    function updateSaveUI(isSaved) {
        const icon = document.getElementById('save-icon');
        if (isSaved) {
            icon.style.fontVariationSettings = "'FILL' 1";
            icon.style.color = '#D4AF37';
        } else {
            icon.style.fontVariationSettings = "'FILL' 0";
            icon.style.color = '#ffffff';
        }
    }

    async function toggleLike() {
        if (!isLoggedIn) {
            window.location.href = '/auth/login.html';
            return;
        }
        const reel = reels[currentIndex];
        const newLiked = !reel.is_liked;
        const newCount = reel.like_count + (newLiked ? 1 : -1);

        // Optimistic Update
        reel.is_liked = newLiked;
        reel.like_count = newCount;
        updateLikeUI(newLiked, newCount);

        try {
            await apiClient.post(`/reels/${reel.id}/like`);
        } catch (e) {
            console.error("Failed to toggle like:", e);
            // Revert
            reel.is_liked = !newLiked;
            reel.like_count = reel.like_count + (!newLiked ? 1 : -1);
            updateLikeUI(!newLiked, reel.like_count);
        }
    }

    async function toggleSave() {
        if (!isLoggedIn) {
            window.location.href = '/auth/login.html';
            return;
        }
        const reel = reels[currentIndex];
        const newSaved = !reel.is_saved;

        // Optimistic Update
        reel.is_saved = newSaved;
        updateSaveUI(newSaved);

        try {
            if (newSaved) {
                await apiClient.post(`/reels/${reel.id}/save`);
            } else {
                await apiClient.delete(`/reels/${reel.id}/save`);
            }
        } catch (e) {
            console.error("Failed to toggle save:", e);
            // Revert
            reel.is_saved = !newSaved;
            updateSaveUI(!newSaved);
        }
    }

    // Comments Panel Handlers
    function openComments() {
        document.getElementById('comments-drawer').classList.remove('translate-x-full');
        loadComments(true);
    }

    function closeComments() {
        document.getElementById('comments-drawer').classList.add('translate-x-full');
        document.getElementById('drawer-comments-list').innerHTML = '';
        commentsCursor = null;
        commentsHasMore = false;
    }

    async function loadComments(reset = false) {
        if (isLoadingComments) return;
        isLoadingComments = true;
        
        const list = document.getElementById('drawer-comments-list');
        const reel = reels[currentIndex];

        if (reset) {
            list.innerHTML = `<div class="text-center py-4 text-sage text-sm">Loading comments...</div>`;
        }

        try {
            let url = `/reels/${reel.id}/comments?limit=15`;
            if (commentsCursor && !reset) {
                url += `&cursor=${commentsCursor}`;
            }

            const res = await apiClient.get(url);
            if (res.data && res.data.success) {
                const data = res.data.data;
                commentsCursor = data.next_cursor;
                commentsHasMore = data.has_more;
                const comments = data.comments || [];

                document.getElementById('drawer-comment-count').innerText = data.comment_count || 0;
                document.getElementById('comment-count').innerText = data.comment_count || 0;
                reel.comment_count = data.comment_count || 0;

                if (reset) {
                    list.innerHTML = '';
                }

                if (comments.length === 0) {
                    if (reset) {
                        list.innerHTML = `<div class="text-center py-8 text-secondary text-sm">No comments yet. Start the conversation!</div>`;
                    }
                    return;
                }

                const commentsHtml = comments.map(c => {
                    const avatarStr = c.avatar_url 
                        ? `<img src="${c.avatar_url}" alt="Avatar" class="w-8 h-8 rounded-full object-cover"/>`
                        : `<div class="w-8 h-8 rounded-full bg-primary-container text-primary flex items-center justify-center font-bold text-xs">${c.user_name.substring(0,1).toUpperCase()}</div>`;
                    return `
                        <div class="flex gap-3 items-start">
                            ${avatarStr}
                            <div class="flex-grow bg-surface-container-low p-3 rounded-2xl border border-outline-variant/10">
                                <div class="flex items-baseline justify-between">
                                    <span class="font-lora font-bold text-sm text-on-surface">${c.user_name}</span>
                                    <span class="text-[10px] text-outline">${c.time_ago || 'just now'}</span>
                                </div>
                                <p class="text-sm text-on-surface-variant mt-1 leading-normal whitespace-pre-wrap">${c.body}</p>
                            </div>
                        </div>
                    `;
                }).join('');

                if (reset) {
                    list.innerHTML = commentsHtml;
                } else {
                    list.insertAdjacentHTML('beforeend', commentsHtml);
                }
            }
        } catch (e) {
            console.error("Failed to load comments:", e);
            if (reset) {
                list.innerHTML = `<div class="text-center py-4 text-error text-sm">Failed to load comments.</div>`;
            }
        } finally {
            isLoadingComments = false;
        }
    }

    async function submitComment() {
        if (!isLoggedIn) {
            window.location.href = '/auth/login.html';
            return;
        }
        const input = document.getElementById('comment-input');
        const text = input.value.trim();
        if (!text) return;

        const reel = reels[currentIndex];
        
        try {
            const res = await apiClient.post(`/reels/${reel.id}/comments`, { body: text });
            if (res.data && res.data.success) {
                input.value = '';
                await loadComments(true);
            }
        } catch (e) {
            console.error("Failed to post comment:", e);
        }
    }

    // Bind event listeners
    document.getElementById('btn-prev-reel').addEventListener('click', () => {
        if (currentIndex > 0) displayReel(currentIndex - 1);
    });
    document.getElementById('btn-next-reel').addEventListener('click', () => {
        if (currentIndex < reels.length - 1) displayReel(currentIndex + 1);
    });

    document.getElementById('btn-like').addEventListener('click', toggleLike);
    document.getElementById('btn-save').addEventListener('click', toggleSave);

    document.getElementById('btn-comment').addEventListener('click', openComments);
    document.getElementById('btn-close-comments').addEventListener('click', closeComments);
    document.getElementById('btn-submit-comment').addEventListener('click', submitComment);

    document.getElementById('comment-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            submitComment();
        }
    });

    window.addEventListener('DOMContentLoaded', async () => {
        await checkAuthState();
        await fetchReels(true);
    });
</script>
</body>
</html>
