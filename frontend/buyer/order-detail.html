<script type="module">
    import apiClient from '/src/utils/apiClient.js';
    import { logout } from '/src/utils/auth.js';
    import { formatPaise } from '/src/utils/currency.js';

    let orderId = null;

    async function initOrderDetail() {
        const token = sessionStorage.getItem('tohfa_access_token');
        if (!token) {
            window.location.href = '/auth/login.html';
            return;
        }

        // Setup user avatar
        try {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const payload = JSON.parse(window.atob(base64));
            const avatarEl = document.getElementById('nav-avatar');
            if (avatarEl) {
                if (payload.username) {
                    avatarEl.innerText = payload.username.substring(0, 1).toUpperCase();
                } else if (payload.email) {
                    avatarEl.innerText = payload.email.substring(0, 1).toUpperCase();
                }
            }
            
            // Fetch profile to get real avatar
            try {
                const res = await apiClient.get('/profile/me');
                if (res.data && res.data.success && res.data.data.avatar_url) {
                    if (avatarEl) {
                        avatarEl.innerHTML = `<img src="${res.data.data.avatar_url}" alt="Avatar" class="w-full h-full object-cover"/>`;
                    }
                }
            } catch (err) {
                console.error("Failed to fetch avatar:", err);
            }
        } catch(e) {
            console.error(e);
        }

        const params = new URLSearchParams(window.location.search);
        orderId = params.get('id');
        if (!orderId) {
            window.location.href = 'orders.html';
            return;
        }

        await fetchOrderDetail();
    }

    async function fetchOrderDetail() {
        const main = document.getElementById('order-detail-main');
        main.innerHTML = `
            <div class="flex flex-col gap-sm py-16 text-center text-sage">
                <span class="material-symbols-outlined animate-spin text-[48px] text-primary">sync</span>
                <p class="font-body-md mt-sm text-on-surface-variant">Loading order details...</p>
            </div>
        `;

        try {
            const res = await apiClient.get(`/orders/${orderId}`);
            if (res.data && res.data.success) {
                const o = res.data.data;
                renderOrderDetail(o);
                updateTimeline(o.status);
            }
        } catch (err) {
            console.error("Error fetching order detail:", err);
            main.innerHTML = `
                <div class="bg-error-container/20 border border-error/30 rounded-2xl p-lg text-center my-lg">
                    <span class="material-symbols-outlined text-error text-[32px] mb-xs">error</span>
                    <p class="font-body-md text-error font-semibold">Failed to load order detail</p>
                    <button onclick="window.history.back()" class="mt-md px-md py-sm bg-primary text-white rounded-lg font-bold hover:bg-primary/95 transition-all">Go Back</button>
                </div>
            `;
        }
    }

    function getStatusBadgeClass(status) {
        switch(status) {
            case 'Awaiting Payment':
                return 'bg-amber-50 text-amber-800 border border-amber-200';
            case 'Processing':
                return 'bg-violet-50 text-violet-800 border border-violet-200';
            case 'Shipped':
                return 'bg-[#C8D7BF] text-[#255338] border border-[#C1C9C0]';
            case 'Delivered':
                return 'bg-[#255338] text-white';
            case 'Cancelled':
                return 'bg-[#B14B3E] text-white';
            default:
                return 'bg-sage-soft text-primary border border-sage';
        }
    }

    function renderOrderDetail(o) {

        const showCancelBtn = (o.status === 'Awaiting Payment' || o.status === 'Processing');

                    <h1 class="font-headline-lg text-headline-lg text-primary">Order Details</h1>
                </div>
                <p class="font-data-price text-[14px] text-on-surface-variant font-bold">#${o.order_ref}</p>
                <div class="mt-xs">
                    <span class="font-body-md text-xs font-bold uppercase tracking-wider rounded-full px-3 py-1 border ${getStatusBadgeClass(o.status)}">${o.status}</span>
                </div>
            </section>

            <!-- Status Timeline -->

                    <!-- Placed -->
                    <div class="flex flex-col items-center gap-2">
                        <div id="dot-placed" class="w-6 h-6 rounded-full bg-sage-soft flex items-center justify-center text-white text-[14px]"></div>
                        <span class="font-label-caps text-[10px] text-primary">PLACED</span>
                    </div>
                    <!-- Paid -->
                    <div class="flex flex-col items-center gap-2">
                        <div id="dot-paid" class="w-6 h-6 rounded-full bg-sage-soft flex items-center justify-center text-white text-[14px]"></div>
                        <span class="font-label-caps text-[10px] text-primary">PAID</span>
                    </div>
                    <!-- Processing -->
                    <div class="flex flex-col items-center gap-2">
                        <div id="dot-processing" class="w-6 h-6 rounded-full bg-sage-soft flex items-center justify-center text-white text-[14px]"></div>
                        <span class="font-label-caps text-[10px] text-primary">PROCESSING</span>
                    </div>
                    <!-- Shipped -->
                    <div class="flex flex-col items-center gap-2">
                        <div id="dot-shipped" class="w-6 h-6 rounded-full bg-sage-soft flex items-center justify-center text-white text-[14px]"></div>
                        <span class="font-label-caps text-[10px] text-primary">SHIPPED</span>
                    </div>
                    <!-- Delivered -->
                    <div class="flex flex-col items-center gap-2">
                        <div id="dot-delivered" class="w-6 h-6 rounded-full bg-sage-soft flex items-center justify-center text-white text-[14px]"></div>
                        <span class="font-label-caps text-[10px] text-primary">DELIVERED</span>
                    </div>
                </div>
            </section>

            <!-- Main Content Grid -->
            <div class="grid grid-cols-1 md:grid-cols-12 gap-lg items-start">
                <!-- Left Side: Items & Shipping -->
                <div class="md:col-span-7 flex flex-col gap-lg">
                    <!-- Items Card -->
                    <div class="space-y-sm">
                        <h4 class="font-label-caps text-label-caps text-primary tracking-widest uppercase mb-xs">ITEMS IN ORDER</h4>
                        ${o.items.map(item => {
                            const imgUrl = item.image_url ? item.image_url : 'https://placehold.co/120x120/f4ede3/516447?text=Handcrafted';
                            return `
                                <div class="bg-white border border-sage/30 rounded-xl p-md flex flex-col gap-sm shadow-sm">
                                    <div class="flex gap-md">
                                        <div class="w-20 h-20 bg-surface-dim rounded-lg overflow-hidden flex-shrink-0 border border-sage/20">
                                            <img class="w-full h-full object-cover" src="${imgUrl}" alt="${item.product_name}">
                                        </div>
                                        <div class="flex flex-col justify-between flex-grow">
                                            <div>
                                                <h3 onclick="window.location.href='product.html?id=${item.product_id}'" class="font-title-serif text-[15px] text-primary hover:underline cursor-pointer font-semibold">${item.product_name}</h3>
                                                <p class="font-data-price text-on-surface-variant text-[12px] mt-1">Qty ${item.quantity} × ${formatPaise(item.unit_price_paise)}</p>
                                            </div>
                                            <div class="text-right">
                                                <span class="font-data-price text-gold-custom text-[15px] font-bold">${formatPaise(item.unit_price_paise * item.quantity)}</span>
                                            </div>
                                        </div>
                                    </div>
                                    ${o.status === 'Delivered' ? `
                                        <div class="border-t border-outline-variant/20 pt-2 mt-2 flex justify-between items-center">
                                            <span class="text-xs text-on-surface-variant">Share your feedback:</span>
                                            <button onclick="openReviewModal(${item.product_id}, '${item.product_name.replace(/'/g, "\\'")}')" class="px-3 py-1.5 bg-primary text-white text-xs font-bold uppercase rounded-lg hover:bg-primary-container hover:text-on-primary-container transition-all">
                                                Write a Review
                                            </button>
                                        </div>
                                    ` : ''}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- Shipping Address Card -->
                    <div class="bg-white border border-sage/30 rounded-xl p-lg relative overflow-hidden shadow-sm">
                        <div class="absolute top-0 right-4 w-12 h-20 bg-primary opacity-[0.05] pointer-events-none transform -rotate-2"></div>
                        <h4 class="font-label-caps text-label-caps text-primary mb-4 uppercase tracking-widest">SHIPPED TO</h4>
                        <p class="font-body-md text-[14px] text-on-surface leading-relaxed">
                            <span class="font-bold">${o.ship_to ? o.ship_to.full_name : 'N/A'}</span><br>
                            ${o.ship_to ? `${o.ship_to.line1},<br>${o.ship_to.line2 ? `${o.ship_to.line2},<br>` : ''}${o.ship_to.city}, ${o.ship_to.state} - ${o.ship_to.pincode}` : 'No shipping details available'}
                        </p>
                        ${o.tracking_number ? `
                            <div class="mt-md pt-md border-t border-outline-variant/30 flex items-center gap-xs">
                                <span class="material-symbols-outlined text-sage text-sm">local_shipping</span>
                                <span class="font-body-md text-xs text-on-surface-variant font-semibold">Tracking No: ${o.tracking_number}</span>
                            </div>
                        ` : ''}
                    </div>
                </div>

                <!-- Right Side: Summary & Actions -->
                <div class="md:col-span-5 flex flex-col gap-lg">
                    <!-- Summary Card -->
                    <div class="bg-sage-soft rounded-xl p-lg relative overflow-hidden border border-sage/20">
                        <h4 class="font-label-caps text-label-caps text-primary mb-6 uppercase tracking-widest">SUMMARY</h4>
                        <div class="space-y-4 relative z-10">
                            <div class="flex justify-between items-center">
                                <span class="text-on-surface-variant font-body-md">Subtotal</span>
                                <span class="font-data-price text-on-surface">${formatPaise(o.subtotal_paise)}</span>
                            </div>
                            <div class="flex justify-between items-center">
                                <span class="text-on-surface-variant font-body-md">Shipping</span>
                                <span class="font-data-price text-on-surface">${formatPaise(o.shipping_paise)}</span>
                            </div>
                            <div class="pt-4 border-t border-outline-variant/40 flex justify-between items-center">
                                <span class="font-title-serif text-primary text-base font-bold">Total</span>
                                <span class="font-data-price text-gold-custom text-[18px] font-bold">${formatPaise(o.total_paise)}</span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Actions -->
                    <div class="flex flex-col gap-4">
                        <button onclick="window.open('receipt.html?id=${o.id}', '_blank')" class="w-full py-3 px-6 rounded-lg border border-primary text-primary font-body-md font-bold hover:bg-primary hover:text-white transition-all transform active:scale-95 flex items-center justify-center gap-xs">

                            <span>Print Receipt</span>
                        </button>
                        ${showCancelBtn ? `

    function updateTimeline(status) {
        const line = document.getElementById('timeline-progress-line');
        const placedDot = document.getElementById('dot-placed');
        const paidDot = document.getElementById('dot-paid');
        const processingDot = document.getElementById('dot-processing');
        const shippedDot = document.getElementById('dot-shipped');
        const deliveredDot = document.getElementById('dot-delivered');
        
        if (!line || !placedDot || !paidDot || !processingDot || !shippedDot || !deliveredDot) return;

        // Reset dots
        placedDot.className = 'w-6 h-6 rounded-full bg-sage-soft flex items-center justify-center text-white';
        paidDot.className = 'w-6 h-6 rounded-full bg-sage-soft flex items-center justify-center text-white';
        processingDot.className = 'w-6 h-6 rounded-full bg-sage-soft flex items-center justify-center text-white';
        shippedDot.className = 'w-6 h-6 rounded-full bg-sage-soft flex items-center justify-center text-white';
        deliveredDot.className = 'w-6 h-6 rounded-full bg-sage-soft flex items-center justify-center text-white';

        placedDot.innerHTML = '';
        paidDot.innerHTML = '';
        processingDot.innerHTML = '';
        shippedDot.innerHTML = '';
        deliveredDot.innerHTML = '';

        let progressWidth = '0%';

        if (status === 'Cancelled') {
            line.style.width = '0%';
            placedDot.className = 'w-6 h-6 rounded-full bg-[#B14B3E] flex items-center justify-center text-white';
            placedDot.innerHTML = '<span class="material-symbols-outlined text-[16px]">close</span>';
            return;
        }

        // Placed is complete
        placedDot.className = 'w-6 h-6 rounded-full bg-primary flex items-center justify-center text-white';
        placedDot.innerHTML = '<span class="material-symbols-outlined text-[16px]">check</span>';

        if (status === 'Awaiting Payment') {
            progressWidth = '12.5%';
            paidDot.className = 'w-6 h-6 rounded-full bg-white border-2 border-gold-custom flex items-center justify-center';
            paidDot.innerHTML = '<div class="w-2 h-2 rounded-full bg-gold-custom"></div>';
        } else {
            // Paid is complete
            paidDot.className = 'w-6 h-6 rounded-full bg-primary flex items-center justify-center text-white';
            paidDot.innerHTML = '<span class="material-symbols-outlined text-[16px]">check</span>';

            if (status === 'Processing') {
                progressWidth = '37.5%';
                processingDot.className = 'w-6 h-6 rounded-full bg-white border-2 border-gold-custom flex items-center justify-center';
                processingDot.innerHTML = '<div class="w-2 h-2 rounded-full bg-gold-custom"></div>';
            } else {
                // Processing is complete
                processingDot.className = 'w-6 h-6 rounded-full bg-primary flex items-center justify-center text-white';
                processingDot.innerHTML = '<span class="material-symbols-outlined text-[16px]">check</span>';

                if (status === 'Shipped') {
                    progressWidth = '62.5%';
                    shippedDot.className = 'w-6 h-6 rounded-full bg-white border-2 border-gold-custom flex items-center justify-center';
                    shippedDot.innerHTML = '<div class="w-2 h-2 rounded-full bg-gold-custom"></div>';
                } else if (status === 'Delivered') {
                    progressWidth = '100%';
                    shippedDot.className = 'w-6 h-6 rounded-full bg-primary flex items-center justify-center text-white';
                    shippedDot.innerHTML = '<span class="material-symbols-outlined text-[16px]">check</span>';
                    
                    deliveredDot.className = 'w-6 h-6 rounded-full bg-primary flex items-center justify-center text-white';
                    deliveredDot.innerHTML = '<span class="material-symbols-outlined text-[16px]">check</span>';
                }
            }
        }

        line.style.width = progressWidth;
    }

    async function cancelOrder() {
        const reason = prompt("Please provide a reason for cancelling this order:");
        if (reason === null) return; // cancelled prompt
        if (reason.trim() === "") {
            alert("A cancellation reason is required.");
            return;
        }

        try {
            const res = await apiClient.post(`/orders/${orderId}/cancel`, { reason: reason.trim() });
            if (res.data && res.data.success) {
                alert("Order cancelled successfully.");
                await fetchOrderDetail();
            }
        } catch (err) {
            console.error("Error cancelling order:", err);
            alert(err.response?.data?.message || "Failed to cancel order.");
        }
    }
    window.cancelOrder = cancelOrder;

    let selectedRating = 0;
    let reviewProductId = null;

    function openReviewModal(prodId, prodName) {
        reviewProductId = prodId;
        selectedRating = 0;
        document.getElementById('review-modal-product-name').textContent = prodName;
        document.getElementById('modal-review-body').value = '';
        updateModalStars();
        
        const modal = document.getElementById('reviewModal');
        if (modal) {
            modal.classList.remove('opacity-0', 'pointer-events-none');
            modal.querySelector('.transform').classList.remove('scale-95');
        }
    }
    window.openReviewModal = openReviewModal;

    function closeReviewModal() {
        const modal = document.getElementById('reviewModal');
        if (modal) {
            modal.classList.add('opacity-0', 'pointer-events-none');
            modal.querySelector('.transform').classList.add('scale-95');
        }
    }
    window.closeReviewModal = closeReviewModal;

    function updateModalStars() {
        const stars = document.querySelectorAll('#modal-rating-stars .star-input');
        stars.forEach((star, index) => {
            if (index < selectedRating) {
                star.style.fontVariationSettings = "'FILL' 1";
            } else {
                star.style.fontVariationSettings = "'FILL' 0";
            }
        });
    }

    async function submitReview() {
        if (selectedRating === 0) {
            alert('Please select a star rating.');
            return;
        }
        const body = document.getElementById('modal-review-body').value.trim();
        if (!body) {
            alert('Please write a review comment.');
            return;
        }

        const btn = document.getElementById('btn-submit-review');
        btn.disabled = true;
        btn.innerText = 'SUBMITTING...';

        try {
            const payload = {
                product_id: Number(reviewProductId),
                order_id: Number(orderId),
                rating: selectedRating,
                body: body
            };

            const res = await apiClient.post('/reviews', payload);
            if (res.data && res.data.success) {
                alert('Thank you! Your review has been posted.');
                closeReviewModal();
                await fetchOrderDetail();
            }
        } catch (err) {
            console.error('Failed to post review:', err);
            alert(err.response?.data?.message || 'Failed to post review.');
        } finally {
            btn.disabled = false;
            btn.innerText = 'SUBMIT REVIEW';
        }
    }
    window.submitReview = submitReview;

    window.addEventListener('DOMContentLoaded', () => {
        initOrderDetail();

        // Bind stars
        document.querySelectorAll('#modal-rating-stars .star-input').forEach(star => {
            star.addEventListener('click', function() {
                selectedRating = parseInt(this.getAttribute('data-val'), 10);
                updateModalStars();
            });
        });

        // Scrim click close
        const reviewModal = document.getElementById('reviewModal');
        if (reviewModal) {
            reviewModal.addEventListener('click', (e) => {
                if (e.target.id === 'reviewModal') {
                    closeReviewModal();
                }
            });
        }
    });

    let isLoggedIn = false;
    async function checkAuthState() {
        const token = sessionStorage.getItem('tohfa_access_token');
        const authContainer = document.getElementById('auth-buttons-container');
        
        if (token) {
            isLoggedIn = true;
            try {
                let avatarUrl = null;
                let initial = 'A';
                try {
                    const res = await apiClient.get('/profile/me');
                    if (res.data && res.data.success) {
                        avatarUrl = res.data.data.avatar_url;
                        if (res.data.data.full_name) {
                            initial = res.data.data.full_name.charAt(0).toUpperCase();
                        }
                    }
                } catch (err) {
                    console.error("Failed to fetch profile avatar:", err);
                }
                
                let avatarHtml = '';
                if (avatarUrl) {
                    avatarHtml = `<img src="${avatarUrl}" alt="Profile" class="w-10 h-10 rounded-full border border-[#C1C9C0] object-cover cursor-pointer" onclick="window.location.href='profile.html'"/>`;
                } else {
                    avatarHtml = `
                        <a href="/buyer/profile.html" class="w-10 h-10 rounded-full bg-[#3D6B4F] flex items-center justify-center text-white font-bold border border-[#C1C9C0] text-sm overflow-hidden flex-shrink-0 cursor-pointer">
                            ${initial}
                        </a>
                    `;
                }

                if (authContainer) {
                    authContainer.innerHTML = '';
                }
            } catch(e) {
                console.error("Failed to parse token:", e);
                logout();
            }
        } else {
            isLoggedIn = false;
            if (authContainer) {
                authContainer.innerHTML = `
                    <div class="flex items-center gap-md">
                        <a href="/auth/login.html" class="text-[#255338] hover:underline text-sm font-semibold">Login</a>
                        <a href="/auth/signup-buyer.html" class="bg-[#255338] text-white px-md py-sm rounded-lg text-sm font-semibold hover:opacity-90 transition-all">Register</a>
                    </div>
                `;
            }
        }
    }

    checkAuthState();
</script>

    <div class="bg-[#FCFAF5] border border-[#C5D6BC] rounded-xl p-8 max-w-md w-full mx-4 shadow-[0_10px_30px_rgba(58,51,40,0.15)] transform scale-95 transition-transform duration-300 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-32 h-32 -mr-16 -mt-16 bg-[#EBD7AE]/20 rounded-full blur-2xl"></div>

            <div class="flex justify-between items-center border-b border-outline-variant/30 pb-2">
                <h3 class="font-headline-md text-xl text-primary font-semibold">Write a Review</h3>
                <button onclick="closeReviewModal()" class="material-symbols-outlined text-outline hover:text-error transition-all">close</button>
            </div>
            <div>
                <p class="text-[10px] text-on-surface-variant uppercase tracking-wider font-semibold">Product</p>
                <p id="review-modal-product-name" class="font-title-serif text-lg text-primary font-semibold">Terracotta Vase</p>
            </div>
            
            <div class="space-y-1">
                <span class="text-[10px] text-on-surface-variant uppercase tracking-wider font-semibold block">Rating</span>
                <div class="flex text-amber-500 gap-1 cursor-pointer" id="modal-rating-stars">
                    <span class="material-symbols-outlined text-[28px] star-input" data-val="1" style="font-variation-settings: 'FILL' 0;">star</span>
                    <span class="material-symbols-outlined text-[28px] star-input" data-val="2" style="font-variation-settings: 'FILL' 0;">star</span>
                    <span class="material-symbols-outlined text-[28px] star-input" data-val="3" style="font-variation-settings: 'FILL' 0;">star</span>
                    <span class="material-symbols-outlined text-[28px] star-input" data-val="4" style="font-variation-settings: 'FILL' 0;">star</span>
                    <span class="material-symbols-outlined text-[28px] star-input" data-val="5" style="font-variation-settings: 'FILL' 0;">star</span>
                </div>
            </div>
            
            <div class="space-y-1">
                <label class="block text-[10px] text-on-surface-variant uppercase tracking-wider font-semibold" for="modal-review-body">Comments</label>
                <textarea id="modal-review-body" class="w-full bg-white border border-[#C5D6BC] rounded-xl p-3 font-body-md focus:ring-1 focus:ring-primary focus:border-primary outline-none text-sm" rows="3" placeholder="Share your experience with this handcrafted creation..."></textarea>
            </div>
            
            <button id="btn-submit-review" onclick="submitReview()" class="w-full bg-primary text-white font-semibold py-3 rounded-lg hover:bg-[#2E5340] transition-colors shadow-sm uppercase tracking-wider text-xs">
                Submit Review
            </button>
        </div>
    </div>
</div>
