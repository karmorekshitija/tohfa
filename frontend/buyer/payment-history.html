<!-- Main Content -->
<main class="max-w-5xl mx-auto px-margin-mobile md:px-margin-desktop py-xl">
<!-- Header -->
<header class="mb-xl text-center md:text-left select-none">
<h1 class="font-serif text-[#255338] text-[40px] font-['Playfair_Display'] font-normal leading-tight">Payments</h1>
<p class="font-serif italic text-outline/80 mt-1">A record of your curated treasures.</p>
</header>

<!-- Summary Strip -->
<section class="mb-xl">
  <div class="bg-white border border-[#EAE1D7] rounded-[16px] py-6 shadow-sm">
    <div class="grid grid-cols-1 md:grid-cols-3 divide-y md:divide-y-0 md:divide-x divide-[#EAE1D7] items-center select-none">
      <!-- Column 1 -->
      <div class="flex flex-col items-center md:items-start px-8 pb-4 md:pb-0">
        <span class="text-[11px] text-outline font-semibold tracking-widest uppercase">TOTAL SPENT</span>
        <div id="stats-total-spent" class="text-[36px] text-[#725476] font-bold mt-2 font-sans leading-none">
          $0.00
        </div>
      </div>
      <!-- Column 2 -->
      <div class="flex flex-col items-center md:items-start px-8 py-4 md:py-0">
        <span class="text-[11px] text-outline font-semibold tracking-widest uppercase">COMPLETED ORDERS</span>
        <div id="stats-completed-orders" class="text-[36px] text-[#255338] font-bold mt-2 font-sans leading-none">
          00
        </div>
      </div>
      <!-- Column 3 -->
      <div class="flex flex-col items-center md:items-start px-8 pt-4 md:pt-0">
        <span class="text-[11px] text-outline font-semibold tracking-widest uppercase">PENDING SHIPMENTS</span>
        <div id="stats-pending-shipments" class="text-[36px] text-[#255338] font-bold mt-2 font-sans leading-none">
          00
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Payment Ledger -->
<div id="payment-ledger-container" class="space-y-xl">
    <!-- Transactions will load dynamically -->
</div>

<!-- Load More Button -->
<div class="flex justify-center mt-xl">
    <button id="btn-load-more" onclick="loadMore()" class="hidden px-xl py-md bg-white border border-sage text-primary rounded-lg font-bold hover:bg-sage-soft transition-all transform active:scale-95">
        Load more payments
    </button>
</div>
</main>

<script type="module">
    import apiClient from '/src/utils/apiClient.js';
    import { logout } from '/src/utils/auth.js';

    let paymentsList = [];
    let nextCursor = null;

    function formatUSD(paise) {
        if (paise == null) return '$0.00';
        const usd = paise / 100;
        return '$' + usd.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    async function initPayments() {
        const token = sessionStorage.getItem('tohfa_access_token');
        if (!token) {
            window.location.href = '/auth/login.html';
            return;
        }

        // Setup user avatar
        try {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const payload = JSON.parse(window.atob(base64));
            const avatarEl = document.getElementById('nav-avatar');
            if (avatarEl) {
                if (payload.username) {
                    avatarEl.innerText = payload.username.substring(0, 1).toUpperCase();
                } else if (payload.email) {
                    avatarEl.innerText = payload.email.substring(0, 1).toUpperCase();
                }
            }
            
            // Fetch profile to get real avatar
            try {
                const res = await apiClient.get('/profile/me');
                if (res.data && res.data.success && res.data.data.avatar_url) {
                    if (avatarEl) {
                        avatarEl.innerHTML = `<img src="${res.data.data.avatar_url}" alt="Avatar" class="w-full h-full object-cover"/>`;
                    }
                }
            } catch (err) {
                console.error("Failed to fetch avatar:", err);
            }
        } catch(e) {
            console.error(e);
        }

        // Fetch cart count for nav badge
        try {
            const res = await apiClient.get('/cart');
            if (res.data && res.data.success) {
                const count = res.data.data.item_count;
                const navBadge = document.getElementById('nav-cart-badge');
                if (navBadge) {
                    if (count > 0) {
                        navBadge.innerText = count;
                        navBadge.classList.remove('hidden');
                    } else {
                        navBadge.classList.add('hidden');
                    }
                }
            }
        } catch (e) {
            console.error(e);
        }

        await fetchPayments(true);
    }

    async function fetchPayments(reset = false) {
        if (reset) {
            nextCursor = null;
            paymentsList = [];
        }

        const container = document.getElementById('payment-ledger-container');
        if (reset) {
            container.innerHTML = `
                <div class="flex flex-col gap-sm py-8 text-center text-sage">
                    <span class="material-symbols-outlined animate-spin text-[32px] text-primary">sync</span>
                    <p class="font-body-md mt-sm text-on-surface-variant">Loading payment history...</p>
                </div>
            `;
        }

        try {
            let url = `/payments/history?limit=10`;
            if (nextCursor) {
                url += `&cursor=${nextCursor}`;
            }

            const res = await apiClient.get(url);
            if (res.data && res.data.success) {
                const { total_spent_paise, completed_order_count, pending_shipment_count, payments, next_cursor, has_more } = res.data.data;
                nextCursor = next_cursor;

                // Update summary stats
                document.getElementById('stats-total-spent').innerText = formatUSD(total_spent_paise);
                document.getElementById('stats-completed-orders').innerText = String(completed_order_count).padStart(2, '0');
                document.getElementById('stats-pending-shipments').innerText = String(pending_shipment_count).padStart(2, '0');

                if (reset) {
                    paymentsList = payments;
                } else {
                    paymentsList = [...paymentsList, ...payments];
                }

                renderPayments();

                const loadMoreBtn = document.getElementById('btn-load-more');
                if (has_more) {
                    loadMoreBtn.classList.remove('hidden');
                } else {
                    loadMoreBtn.classList.add('hidden');
                }
            }
        } catch (err) {
            console.error("Error loading payments:", err);
            container.innerHTML = `
                <div class="bg-error-container/20 border border-error/30 rounded-2xl p-lg text-center my-lg">
                    <span class="material-symbols-outlined text-error text-[32px] mb-xs">error</span>
                    <p class="font-body-md text-error font-semibold">Failed to load payment history</p>
                    <button onclick="window.location.reload()" class="mt-md px-md py-sm bg-primary text-white rounded-lg font-bold hover:bg-primary/95 transition-all">Retry</button>
                </div>
            `;
        }
    }

    function getStatusBadgeClass(status) {
        switch(status) {
            case 'Awaiting Payment':
                return 'bg-amber-50 text-amber-800 border-amber-200/50';
            case 'Processing':
                return 'bg-violet-50 text-[#725476] border-violet-200/50';
            case 'Shipped':
                return 'bg-[#E8F0E4] text-[#255338] border-[#255338]/20';
            case 'Delivered':
                return 'bg-[#255338] text-white border-transparent';
            case 'Cancelled':
                return 'bg-[#BA1A1A] text-white border-transparent';
            default:
                return 'bg-sage-soft text-primary border-sage/20';
        }
    }

    function getTransactionIconDetails(ref, status) {
        if (status === 'Cancelled') {
            return {
                icon: 'favorite',
                iconColorClass: 'text-[#ba1a1a] bg-[#ffdad6]'
            };
        }
        
        let hash = 0;
        for (let i = 0; i < ref.length; i++) {
            hash = ref.charCodeAt(i) + ((hash << 5) - hash);
        }
        const choice = Math.abs(hash) % 3;
        if (choice === 0) {
            return {
                icon: 'local_mall',
                iconColorClass: 'text-[#255338] bg-[#E8F0E4]'
            };
        } else if (choice === 1) {
            return {
                icon: 'brush',
                iconColorClass: 'text-[#C87A53] bg-[#fbf2e8]'
            };
        } else {
            return {
                icon: 'diamond',
                iconColorClass: 'text-[#725476] bg-[#fcd6ff]'
            };
        }
    }

    function getPaymentMethodIcon(label) {
        const lower = (label || '').toLowerCase();
        if (lower.includes('credit') || lower.includes('store')) {
            return 'toll';
        } else if (lower.includes('wallet') || lower.includes('apple') || lower.includes('pay')) {
            return 'account_balance_wallet';
        } else {
            return 'credit_card';
        }
    }

    function renderPayments() {
        const container = document.getElementById('payment-ledger-container');
        if (paymentsList.length === 0) {
            container.innerHTML = `
                <div class="text-center py-12 bg-[#FCFAF5] border border-dashed border-sage rounded-2xl p-lg">
                    <span class="material-symbols-outlined text-sage text-[48px] mb-sm">payments</span>
                    <h3 class="font-headline-lg text-lg text-primary">No payments found</h3>
                    <p class="text-on-surface-variant text-sm mt-xs">No transaction records found on your account.</p>
                </div>
            `;
            return;
        }

        // Group by Month Year
        const groups = {};
        paymentsList.forEach(p => {
            const dateObj = new Date(p.paid_at);
            const monthYear = dateObj.toLocaleDateString('en-US', { month: 'long', year: 'numeric' }).toUpperCase();
            if (!groups[monthYear]) {
                groups[monthYear] = [];
            }
            groups[monthYear].push(p);
        });

        let html = '';
        for (const monthYear in groups) {
            html += `
                <section>
                    <h3 class="font-label-caps text-[12px] font-semibold text-[#4A3B70] tracking-widest mt-8 mb-4 uppercase select-none">${monthYear}</h3>
                    <div class="space-y-md">
                        ${groups[monthYear].map(p => {
                            const dateStr = new Date(p.paid_at).toLocaleDateString('en-US', {
                                month: 'short', day: '2-digit', year: 'numeric'
                            }).toUpperCase();
                            
                            const iconDetails = getTransactionIconDetails(p.order_ref || String(p.order_id), p.status);
                            const payIcon = getPaymentMethodIcon(p.payment_method_label);
                            
                            let priceColor = 'text-[#4A3B70]'; // Delivered/Delivering default purple
                            if (p.status === 'Cancelled') {
                                priceColor = 'text-[#BA1A1A]';
                            } else if (p.status === 'Shipped') {
                                priceColor = 'text-on-surface';
                            }

                            return `
                                <div onclick="window.location.href='order-detail.html?id=${p.order_id}'" class="bg-white border border-[#EAE1D7] rounded-[16px] p-4 flex flex-col md:flex-row items-start md:items-center justify-between gap-md hover:border-[#255338] transition-all duration-300 cursor-pointer shadow-sm">
                                    <!-- Left Section -->
                                    <div class="flex items-center gap-md select-none">
                                        <div class="w-11 h-11 rounded-full flex items-center justify-center flex-shrink-0 border border-outline-variant/10 ${iconDetails.iconColorClass}">
                                            <span class="material-symbols-outlined text-[20px]">${iconDetails.icon}</span>
                                        </div>
                                        <div>
                                            <div class="font-bold text-[#1f1b15] font-sans tracking-wide text-sm">${p.order_ref}</div>
                                            <div class="text-[11px] text-outline font-sans font-semibold mt-[2px]">${dateStr}</div>
                                        </div>
                                    </div>
                                    
                                    <!-- Middle Section -->
                                    <div class="flex flex-grow justify-start md:justify-center select-none">
                                        <span class="font-sans text-on-surface-variant flex items-center gap-xs text-xs font-semibold">
                                            <span class="material-symbols-outlined text-outline/80 text-[18px]">${payIcon}</span>
                                            <span>${p.payment_method_label} ${p.razorpay_payment_id ? `(${p.razorpay_payment_id})` : ''}</span>
                                        </span>
                                    </div>
                                    
                                    <!-- Right Section -->
                                    <div class="flex items-center justify-between w-full md:w-auto gap-xl">
                                        <div class="font-data-price ${priceColor} text-[18px] font-bold font-sans">${formatUSD(p.amount_paise)}</div>
                                        <span class="font-body-md text-[10px] font-bold uppercase tracking-wider rounded-full px-4 py-1.5 select-none ${getStatusBadgeClass(p.status)}">${p.status.toUpperCase()}</span>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </section>
            `;
        }

        container.innerHTML = html;
    }

    function loadMore() {
        fetchPayments(false);
    }

    window.loadMore = loadMore;

    window.addEventListener('DOMContentLoaded', initPayments);

    let isLoggedIn = false;
    async function checkAuthState() {
        const token = sessionStorage.getItem('tohfa_access_token');
        const authContainer = document.getElementById('auth-buttons-container');
        
        if (token) {
            isLoggedIn = true;
            try {
                let avatarUrl = null;
                let initial = 'A';
                try {
                    const res = await apiClient.get('/profile/me');
                    if (res.data && res.data.success) {
                        avatarUrl = res.data.data.avatar_url;
                        if (res.data.data.full_name) {
                            initial = res.data.data.full_name.charAt(0).toUpperCase();
                        }
                    }
                } catch (err) {
                    console.error("Failed to fetch profile avatar:", err);
                }
                
                let avatarHtml = '';
                if (avatarUrl) {
                    avatarHtml = `<img src="${avatarUrl}" alt="Profile" class="w-10 h-10 rounded-full border border-[#C1C9C0] object-cover cursor-pointer" onclick="window.location.href='profile.html'"/>`;
                } else {
                    avatarHtml = `
                        <a href="/buyer/profile.html" class="w-10 h-10 rounded-full bg-[#3D6B4F] flex items-center justify-center text-white font-bold border border-[#C1C9C0] text-sm overflow-hidden flex-shrink-0 cursor-pointer">
                            ${initial}
                        </a>
                    `;
                }

                if (authContainer) {
                    authContainer.innerHTML = '';
                }
            } catch(e) {
                console.error("Failed to parse token:", e);
                logout();
            }
        } else {
            isLoggedIn = false;
            if (authContainer) {
                authContainer.innerHTML = `
                    <div class="flex items-center gap-md">
                        <a href="/auth/login.html" class="text-[#255338] hover:underline text-sm font-semibold">Login</a>
                        <a href="/auth/signup-buyer.html" class="bg-[#255338] text-white px-md py-sm rounded-lg text-sm font-semibold hover:opacity-90 transition-all">Register</a>
                    </div>
                `;
            }
        }
    }

    checkAuthState();
</script>
