<!-- Footer -->
<footer class="bg-transparent border-t border-[#EAE1D7]/30 py-8 text-center text-xs text-outline/60 mt-auto select-none">

</footer>

<script type="module">
    import apiClient from '/src/utils/apiClient.js';
    import { logout } from '/src/utils/auth.js';

    let notifications = [];

    function formatNotificationMessage(msg) {
        if (!msg) return '';
        // List of phrases to bold
        const phrases = [
            'Terracotta Vase',
            'Aria Studio',
            'Cedarwood Incense',
            'Monsoon Garden',
            'Silk Weaver',
            'Monsoon Garden'
        ];
        let formatted = msg;
        phrases.forEach(phrase => {
            const regex = new RegExp(`(${phrase})`, 'gi');
            formatted = formatted.replace(regex, '<strong>$1</strong>');
        });
        return formatted;
    }

    function getNotificationIconDetails(icon) {
        const iconStr = (icon || '').toLowerCase();
        if (iconStr.includes('package') || iconStr.includes('shipping') || iconStr.includes('box')) {
            return {
                icon: 'package_2',
                classes: 'text-[#255338] bg-[#E8F0E4]'
            };
        } else if (iconStr.includes('favorite') || iconStr.includes('heart') || iconStr.includes('love')) {
            return {
                icon: 'favorite',
                classes: 'text-[#725476] bg-[#fcd6ff]'
            };
        } else if (iconStr.includes('star') || iconStr.includes('rate') || iconStr.includes('review')) {
            return {
                icon: 'star',
                classes: 'text-[#C87A53] bg-[#fbf2e8]'
            };
        } else if (iconStr.includes('florist') || iconStr.includes('flower') || iconStr.includes('garden') || iconStr.includes('plant')) {
            return {
                icon: 'local_florist',
                classes: 'text-[#255338] bg-[#E8F0E4]'
            };
        } else {
            return {
                icon: icon || 'notifications',
                classes: 'text-secondary bg-secondary-container/30'
            };
        }
    }

    function renderNotificationsList() {
        const listContainer = document.getElementById('notifications-list-container');
        const emptyState = document.getElementById('empty-state');
        listContainer.innerHTML = '';
        listContainer.appendChild(emptyState);

        if (notifications.length === 0) {
            emptyState.classList.remove('hidden');
            return;
        } else {
            emptyState.classList.add('hidden');
        }

        // Group notifications into Today vs Earlier
        const today = new Date().toDateString();
        const todayItems = [];
        const earlierItems = [];

        notifications.forEach(item => {
            const itemDate = new Date(item.created_at).toDateString();
            if (itemDate === today) {
                todayItems.push(item);
            } else {
                earlierItems.push(item);
            }
        });

        // Helper to render a group
        const renderGroup = (title, items) => {
            if (items.length === 0) return;

            // Group header
            const header = document.createElement('div');
            header.className = "py-md bg-transparent border-b border-[#EAE1D7] mt-8 mb-4 select-none";
            header.innerHTML = `<span class="text-[10px] text-[#C87A53] font-bold tracking-widest uppercase">${title}</span>`;
            listContainer.appendChild(header);

            // Group items
            items.forEach(item => {
                const row = document.createElement('div');
                const isUnread = !item.is_read;
                const iconDetails = getNotificationIconDetails(item.icon);
                
                row.className = `flex items-center gap-md p-md hover:bg-white/40 transition-colors border-b border-[#EAE1D7]/60 group cursor-pointer relative ${isUnread ? 'pl-3.5 border-l-4 border-l-[#D4AF37] bg-white/20' : 'pl-md border-l-0'}`;
                
                if (item.link_url) {
                    row.onclick = () => window.location.href = item.link_url;
                }

                row.innerHTML = `
                    <div class="w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0 ${iconDetails.classes}">
                        <span class="material-symbols-outlined text-[20px]">${iconDetails.icon}</span>
                    </div>
                    <div class="flex-grow">
                        <p class="text-[14px] text-on-surface leading-snug font-sans">${formatNotificationMessage(item.message)}</p>
                        <span class="text-[11px] text-outline uppercase tracking-wider font-semibold font-sans block mt-[3px]">${item.time_ago.toUpperCase()}</span>
                    </div>
                    ${isUnread ? `
                    <div class="flex flex-col items-end gap-xs flex-shrink-0 select-none">
                        <div class="w-2 h-2 rounded-full bg-[#D4AF37]"></div>
                    </div>` : ''}
                `;

                listContainer.appendChild(row);
            });
        };

        renderGroup('TODAY', todayItems);
        renderGroup('EARLIER', earlierItems);
    }

    async function fetchNotifications() {
        try {
            const res = await apiClient.get('/notifications');
            if (res.data && res.data.success) {
                notifications = res.data.data.notifications || [];
                const unreadCount = res.data.data.unread_count || 0;

                // Update navbar badge
                const badge = document.getElementById('nav-notifications-badge');
                if (badge) {
                    if (unreadCount > 0) {
                        badge.classList.remove('hidden');
                    } else {
                        badge.classList.add('hidden');
                    }
                }

                renderNotificationsList();
            }
        } catch (err) {
            console.error('Failed to fetch notifications:', err);
        }
    }

    async function markAllRead() {
        try {
            const res = await apiClient.patch('/notifications/read-all');
            if (res.data && res.data.success) {
                // Update local state to all read
                notifications.forEach(item => item.is_read = true);
                
                // Update badge
                const badge = document.getElementById('nav-notifications-badge');
                if (badge) badge.classList.add('hidden');

                renderNotificationsList();
            }
        } catch (err) {
            console.error('Failed to mark all as read:', err);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        fetchNotifications();

        // Bind Mark all read button
        const markAllBtn = document.querySelector('button.text-[#725476]');
        if (markAllBtn) {
            markAllBtn.addEventListener('click', (e) => {
                e.preventDefault();
                markAllRead();
            });
        }
    });

    let isLoggedIn = false;
    async function checkAuthState() {
        const token = sessionStorage.getItem('tohfa_access_token');
        const authContainer = document.getElementById('auth-buttons-container');
        
        if (token) {
            isLoggedIn = true;
            try {
                let avatarUrl = null;
                let initial = 'A';
                try {
                    const res = await apiClient.get('/profile/me');
                    if (res.data && res.data.success) {
                        avatarUrl = res.data.data.avatar_url;
                        if (res.data.data.full_name) {
                            initial = res.data.data.full_name.charAt(0).toUpperCase();
                        }
                    }
                } catch (err) {
                    console.error("Failed to fetch profile avatar:", err);
                }
                
                let avatarHtml = '';
                if (avatarUrl) {
                    avatarHtml = `<img src="${avatarUrl}" alt="Profile" class="w-10 h-10 rounded-full border border-[#C1C9C0] object-cover cursor-pointer" onclick="window.location.href='profile.html'"/>`;
                } else {
                    avatarHtml = `
                        <a href="/buyer/profile.html" class="w-10 h-10 rounded-full bg-[#3D6B4F] flex items-center justify-center text-white font-bold border border-[#C1C9C0] text-sm overflow-hidden flex-shrink-0 cursor-pointer">
                            ${initial}
                        </a>
                    `;
                }

                if (authContainer) {
                    authContainer.innerHTML = `
                        <div class="flex items-center gap-md">
                            ${avatarHtml}
                            <button id="logout-btn" class="text-[#255338] hover:text-red-700 transition-colors text-xs font-semibold uppercase tracking-wider">Logout</button>
                        </div>
                    `;
                    document.getElementById('logout-btn')?.addEventListener('click', logout);
                }
            } catch(e) {
                console.error("Failed to parse token:", e);
                logout();
            }
        } else {
            isLoggedIn = false;
            if (authContainer) {
                authContainer.innerHTML = `
                    <div class="flex items-center gap-md">
                        <a href="/auth/login.html" class="text-[#255338] hover:underline text-sm font-semibold">Login</a>
                        <a href="/auth/signup-buyer.html" class="bg-[#255338] text-white px-md py-sm rounded-lg text-sm font-semibold hover:opacity-90 transition-all">Register</a>
                    </div>
                `;
            }
        }
    }

    checkAuthState();
</script>
