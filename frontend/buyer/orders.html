<body class="paper-texture font-body-md text-on-surface antialiased">

  <!-- Navigation Links -->

<!-- Main Content Area -->
<main class="relative min-h-screen pt-xl pb-xl max-w-[1440px] mx-auto px-margin-desktop bg-white">
<!-- Botanical Watermark Overlay -->
<div class="absolute inset-0 botanical-bg z-0 pointer-events-none"></div>
<section class="relative z-10 max-w-4xl mx-auto">
<h1 class="font-headline-lg text-[36px] text-primary mb-lg">Your orders</h1>
<!-- Filter Pills -->
<div class="flex items-center gap-md mb-xl">
<button id="pill-all" onclick="filterStatus('all')" class="bg-primary text-white px-lg py-sm rounded-full font-body-md transition-all">All</button>
<button id="pill-active" onclick="filterStatus('active')" class="bg-white border border-sage text-on-surface-variant px-lg py-sm rounded-full font-body-md hover:bg-surface-container-low transition-all">Active</button>
<button id="pill-delivered" onclick="filterStatus('Delivered')" class="bg-white border border-sage text-on-surface-variant px-lg py-sm rounded-full font-body-md hover:bg-surface-container-low transition-all">Delivered</button>
<button id="pill-cancelled" onclick="filterStatus('Cancelled')" class="bg-white border border-sage text-on-surface-variant px-lg py-sm rounded-full font-body-md hover:bg-surface-container-low transition-all">Cancelled</button>
</div>

<!-- Order List Stack -->
<div id="orders-list-container" class="flex flex-col gap-lg">
    <!-- Orders will load dynamically -->
</div>

<!-- Load More Button -->
<div class="flex justify-center mt-xl">
    <button id="btn-load-more" onclick="loadMore()" class="hidden px-xl py-md bg-white border border-sage text-primary rounded-lg font-bold hover:bg-sage-soft transition-all transform active:scale-95">
        Load more orders
    </button>
</div>
</section>
</main>

<script type="module">
    import apiClient from '/src/utils/apiClient.js';
    import { formatPaise } from '/src/utils/currency.js';

    let ordersList = [];
    let nextCursor = null;
    let currentStatus = 'all';

    async function initOrders() {
        const token = sessionStorage.getItem('tohfa_access_token');
        if (!token) {
            window.location.href = '/auth/login.html';
            return;
        }
        
        // Set user avatar
        try {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const payload = JSON.parse(window.atob(base64));
            const avatarEl = document.getElementById('nav-avatar');
            if (avatarEl) {
                if (payload.username) {
                    avatarEl.innerText = payload.username.substring(0, 1).toUpperCase();
                } else if (payload.email) {
                    avatarEl.innerText = payload.email.substring(0, 1).toUpperCase();
                }
            }
            
            // Fetch profile to get real avatar
            try {
                const res = await apiClient.get('/profile/me');
                if (res.data && res.data.success && res.data.data.avatar_url) {
                    if (avatarEl) {
                        avatarEl.innerHTML = `<img src="${res.data.data.avatar_url}" alt="Avatar" class="w-full h-full object-cover"/>`;
                    }
                }
            } catch (err) {
                console.error("Failed to fetch avatar:", err);
            }
        } catch(e) {
            console.error(e);
        }
        
        // Fetch cart count for nav badge
        try {
            const res = await apiClient.get('/cart');
            if (res.data && res.data.success) {
                const count = res.data.data.item_count;
                const navBadge = document.getElementById('nav-cart-badge');
                if (navBadge) {
                    if (count > 0) {
                        navBadge.innerText = count;
                        navBadge.classList.remove('hidden');
                    } else {
                        navBadge.classList.add('hidden');
                    }
                }
            }
        } catch (e) {
            console.error(e);
        }

        await fetchOrders(true);
    }

    async function fetchOrders(reset = false) {
        if (reset) {
            nextCursor = null;
            ordersList = [];
        }
        
        const container = document.getElementById('orders-list-container');
        if (reset) {
            container.innerHTML = `
                <div class="flex flex-col gap-sm py-8 text-center text-sage">
                    <span class="material-symbols-outlined animate-spin text-[32px] text-primary">sync</span>
                    <p class="font-body-md mt-sm text-on-surface-variant">Loading orders...</p>
                </div>
            `;
        }

        try {
            let url = `/orders?limit=10`;
            if (currentStatus !== 'all') {
                url += `&status=${currentStatus}`;
            }
            if (nextCursor) {
                url += `&cursor=${nextCursor}`;
            }

            const res = await apiClient.get(url);
            if (res.data && res.data.success) {
                const { orders, next_cursor, has_more } = res.data.data;
                nextCursor = next_cursor;

                if (reset) {
                    ordersList = orders;
                } else {
                    ordersList = [...ordersList, ...orders];
                }

                renderOrders();

                const loadMoreBtn = document.getElementById('btn-load-more');
                if (has_more) {
                    loadMoreBtn.classList.remove('hidden');
                } else {
                    loadMoreBtn.classList.add('hidden');
                }
            }
        } catch (err) {
            console.error("Error fetching orders:", err);
            container.innerHTML = `
                <div class="bg-error-container/20 border border-error/30 rounded-2xl p-lg text-center my-lg">
                    <span class="material-symbols-outlined text-error text-[32px] mb-xs">error</span>
                    <p class="font-body-md text-error font-semibold">Failed to load orders</p>
                    <button onclick="window.location.reload()" class="mt-md px-md py-sm bg-primary text-white rounded-lg font-bold hover:bg-primary/95 transition-all">Retry</button>
                </div>
            `;
        }
    }

    function getStatusBadgeClass(status) {
        switch(status) {
            case 'Awaiting Payment':
                return 'bg-amber-50 text-amber-800 border border-amber-200';
            case 'Processing':
                return 'bg-violet-50 text-violet-800 border border-violet-200';
            case 'Shipped':
                return 'bg-[#C8D7BF] text-[#255338] border border-[#C1C9C0]';
            case 'Delivered':
                return 'bg-[#255338] text-white';
            case 'Cancelled':
                return 'bg-[#B14B3E] text-white';
            default:
                return 'bg-sage-soft text-primary border border-sage';
        }
    }

    function renderOrders() {
        const container = document.getElementById('orders-list-container');
        if (ordersList.length === 0) {
            container.innerHTML = `
                <div class="text-center py-12 bg-white border border-dashed border-sage rounded-2xl p-lg">
                    <span class="material-symbols-outlined text-sage text-[48px] mb-sm">receipt_long</span>
                    <h3 class="font-headline-lg text-lg text-primary">No orders found</h3>
                    <p class="text-on-surface-variant text-sm mt-xs max-w-xs mx-auto">You haven't placed any orders matching this filter yet.</p>
                    <button onclick="window.location.href='category.html'" class="mt-md px-xl py-md bg-primary text-white font-bold rounded-lg hover:bg-primary/90 transition-all">Shop Handcrafted Goods</button>
                </div>
            `;
            return;
        }

        container.innerHTML = ordersList.map(o => {
            const imgUrl = o.primary_image_url ? o.primary_image_url : 'https://placehold.co/120x120/f4ede3/516447?text=Handcrafted';
            const formattedDate = new Date(o.created_at).toLocaleDateString('en-IN', {
                year: 'numeric', month: 'short', day: 'numeric'
            });

            return `
                <div onclick="window.location.href='order-detail.html?id=${o.id}'" class="relative group bg-white border border-sage/50 rounded-2xl p-lg flex items-center justify-between hover:border-primary transition-all duration-300 cursor-pointer shadow-sm">
                    <div class="flex items-center gap-xl">
                        <!-- Thumbnail -->
                        <div class="w-12 h-12 rounded-lg overflow-hidden flex-shrink-0 border border-sage/30">
                            <img class="w-full h-full object-cover" src="${imgUrl}" alt="${o.item_preview}">
                        </div>
                        <!-- Order Details -->
                        <div>
                            <div class="flex items-center gap-sm mb-xs flex-wrap">
                                <span class="font-data-price text-label-caps text-on-surface-variant opacity-60">#${o.order_ref}</span>
                                <span class="text-outline opacity-40">•</span>
                                <span class="font-data-price text-label-caps text-on-surface-variant opacity-60">${formattedDate}</span>
                            </div>
                            <h3 class="font-title-serif text-lg text-on-surface mb-sm font-semibold">${o.item_preview}</h3>
                            <span class="font-body-md text-[11px] font-bold uppercase tracking-wider rounded-full px-2.5 py-0.5 border ${getStatusBadgeClass(o.status)}">${o.status}</span>
                        </div>
                    </div>
                    <div class="text-right flex flex-col items-end gap-sm">
                        <span class="font-data-price text-lg font-bold text-gold-custom">${formatPaise(o.total_paise)}</span>
                        <span class="material-symbols-outlined text-outline opacity-40 group-hover:text-primary transition-colors">chevron_right</span>
                    </div>
                </div>
            `;
        }).join('');
    }

    function filterStatus(status) {
        currentStatus = status;
        
        // Reset pills styling
        const pills = ['all', 'active', 'Delivered', 'Cancelled'];
        pills.forEach(p => {
            const btn = document.getElementById(`pill-${p.toLowerCase()}`);
            if (btn) {
                if (p === status) {
                    btn.className = "bg-primary text-white px-lg py-sm rounded-full font-body-md transition-all";
                } else {
                    btn.className = "bg-white border border-sage text-on-surface-variant px-lg py-sm rounded-full font-body-md hover:bg-surface-container-low transition-all";
                }
            }
        });

        fetchOrders(true);
    }

    function loadMore() {
        fetchOrders(false);
    }

    window.filterStatus = filterStatus;
    window.loadMore = loadMore;

    window.addEventListener('DOMContentLoaded', initOrders);
</script>
</body>
