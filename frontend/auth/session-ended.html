    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .sketch-texture {
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
            opacity: 0.08;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-[#D8E8D0] font-body-main text-on-surface overflow-x-hidden">
    
    <!-- Top Navigation -->
    <div id="tohfa-navbar"></div>

    <div class="fixed inset-0 sketch-texture z-0"></div>

    <!-- Main Canvas -->
    <main class="min-h-[calc(100vh-128px)] flex items-center justify-center py-12 px-6 bg-[#D8E8D0] relative z-10">
        <!-- Session Ended Modal Card -->
        <div class="bg-[#FDFAF5] w-full max-w-[360px] border border-[#D4C9B8] rounded-[16px] shadow-[0_4px_24px_rgba(0,0,0,0.07)] overflow-hidden flex flex-col items-center p-10 relative bg-surface-ivory">
            <!-- Hand-drawn line motif -->
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-sage-soft via-gold-soft to-sage-soft opacity-40"></div>
            
            <!-- Chibi Artisan Illustration -->
            <div class="mb-6 w-[120px] h-[120px] flex items-center justify-center">
                <img alt="A charming chibi-style illustration of a young artisan peacefully napping at a wooden workbench." class="w-full h-full object-contain" src="https://lh3.googleusercontent.com/aida/ADBb0ugPmY0zKYgsAjuqrJo0R1uQZcttttKpYOqM8KuOZyrtKcUkTfbblb2AXGHg-lCvJ01p4hZzFyMpelF3omLrreeJ05sZv6KdoFJuKJu832w_I8MdK1QwT2-nSc6UHWh0baU9OL9qD70MDjvsURSHMRT63v0Gc7c7YLYQ9CQrpVZPn_bQUz31zBr_wdqmLZPQqq2miurvSneFUJXce1XpyAJBnemXkiCdXfWrvbRZDi_CNs5Kt-XykDEbmIa_"/>
            </div>

            <!-- Typography -->
            <h1 class="font-serif italic text-2xl text-[#2D5016] text-center mb-2">
                Your session has rested
            </h1>
            <p class="font-serif italic text-sm text-[#6B6B6B] text-center mb-6">
                For your safety, please log in again.
            </p>

            <!-- Actions -->
            <button onclick="window.location.href='/auth/login.html'" class="w-full bg-[#2D5016] text-white py-[14px] rounded-[8px] font-sans font-semibold text-sm hover:bg-[#1e360f] transition-all active:scale-[0.98] shadow-md">
                Log in
            </button>
            <a href="/" class="mt-4 text-sm text-[#6B6B6B] hover:text-[#2D5016] transition-colors font-medium">
                Return to gallery
            </a>
        </div>
    </main>

    <!-- Footer -->
    <div id="tohfa-footer"></div>

    <script>
        // Simple entrance animation for the modal
        document.addEventListener('DOMContentLoaded', () => {
            const modal = document.querySelector('.bg-surface-ivory');
            if (modal) {
                modal.style.opacity = '0';
                modal.style.transform = 'translateY(20px) scale(0.95)';
                
                setTimeout(() => {
                    modal.style.transition = 'all 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
                    modal.style.opacity = '1';
                    modal.style.transform = 'translateY(0) scale(1)';
                }, 100);
            }
        });
    </script>
    <script src="../components/tohfa-include.js"></script>
</body>
</html>
