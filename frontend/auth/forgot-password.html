<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Forgot Password | Tohfa</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;500&amp;family=EB+Garamond:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-lowest": "#ffffff",
              "surface-container": "#f4ede3",
              "outline": "#76786e",
              "error-container": "#ffdad6",
              "on-error-container": "#93000a",
              "error": "#ba1a1a",
              "primary": "#576242",
              "on-primary": "#ffffff",
              "background": "#fff8f1",
              "on-surface": "#1e1b15",
              "on-surface-variant": "#45483f",
              "primary-container": "#a8b48e",
              "on-primary-container": "#3c4628"
            },
            fontFamily: {
              "headline-lg": ["EB Garamond"],
              "body-md": ["Be Vietnam Pro"],
              "label-sm": ["Be Vietnam Pro"]
            }
          }
        }
      }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .botanical-bg {
            background-color: #fff8f1;
            background-image: radial-gradient(#e9e1d8 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="botanical-bg font-body-md text-on-surface min-h-screen flex items-center justify-center p-5 relative overflow-hidden">
    <!-- Decorative Botanical Sprigs -->
    <div class="absolute top-0 left-0 w-64 h-64 opacity-10 pointer-events-none select-none -translate-x-1/4 -translate-y-1/4 rotate-12">
        <img class="w-full h-full object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA_SD2xwVeJ3fsFyJEuk-3J3oW6PIEZdRhVnpyl_GMOwGqWeh8VM3RW5BWk17kw74HWD4XdL-njooX2FFKWQxVhhQmdjI4gOFc5bg_fl-jcIyPdPRVvkVmic-B0Q7GlgqORYcLhOD7rEs6if1B1zs7lk9te70a9ghECFYe9T2WavpA5Uhk6MUWGl1O2VKJS7BeytweT1PdC2oYiMDj3BxVAfqpoz0uXthTYs2eRWq7ktWVuB98bllN_M4cNLDXRKmMEiTMPPsOe90E"/>
    </div>
    <div class="absolute bottom-0 right-0 w-80 h-80 opacity-10 pointer-events-none select-none translate-x-1/4 translate-y-1/4 -rotate-12">
        <img class="w-full h-full object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAvK5Z6vmL2WV2TwCCqDh3VaI2QXnU1wlU2umhl3ogQ9MyTNhtEkMHPTUpSZRP_sikj6Fa04AbNF2w2SzvNPJoNZAbGarUpx2mQ0EAoiv-RGsQWz91Hmm6MwlX0G_9tT-1zyIwWx0Q-ZNlDo7hM_jRDY1pqc_CwpXo-IsIyThGtkCdP5u4HMuryJUhRPf1dyOZj8j4sN_0TwB4jWtvYW3hUn68qjmjMt2lFs9Q2rlC2G8sAprqswhnbFNhjPPB1BPeL5cpL-uHUQ8Q"/>
    </div>

    <!-- Container -->
    <main class="w-full max-w-[440px] z-10">
        <div class="bg-surface-container-lowest border border-outline-variant p-8 md:p-10 rounded-lg shadow-sm">
            <!-- Logo Section -->
            <header class="text-center mb-8">
                <h1 class="font-headline-lg text-3xl text-primary tracking-tight mb-2">Tohfa</h1>
                <p class="font-label-sm text-xs text-on-surface-variant uppercase tracking-wider">Forgot Password</p>
            </header>

            <!-- Success Alert Banner -->
            <div id="general-success" class="hidden bg-emerald-50 border border-emerald-200 text-emerald-800 p-4 rounded-md mb-6 flex items-start gap-2.5">
                <span class="material-symbols-outlined text-[20px] text-emerald-600 shrink-0 mt-0.5">check_circle</span>
                <p id="general-success-text" class="font-body-md text-[13px] leading-relaxed"></p>
            </div>

            <!-- General Error Alert Banner -->
            <div id="general-error" class="hidden bg-error-container border border-error text-on-error-container p-4 rounded-md mb-6 flex items-start gap-2.5">
                <span class="material-symbols-outlined text-[20px] text-error shrink-0 mt-0.5">warning</span>
                <p id="general-error-text" class="font-body-md text-[13px] leading-relaxed"></p>
            </div>

            <!-- Forgot Form -->
            <form class="space-y-6" id="forgot-form">
                <div>
                    <label class="block font-label-sm text-xs text-on-surface-variant uppercase mb-2" for="email">Email Address</label>
                    <input class="w-full bg-transparent border border-outline-variant px-4 py-3 text-sm focus:border-primary focus:outline-none transition-colors rounded" id="email" name="email" placeholder="name@example.com" required type="email"/>
                </div>

                <button class="w-full bg-primary-container text-on-primary-container py-3.5 rounded font-label-sm text-xs uppercase tracking-widest hover:bg-primary hover:text-on-primary transition-all duration-300 font-semibold shadow-sm" type="submit" id="submit-btn">
                    Send Reset Link
                </button>
            </form>

            <footer class="mt-8 pt-6 border-t border-outline-variant text-center">
                <p class="font-body-md text-sm text-on-surface-variant">
                    Remember your password? 
                    <a class="text-primary font-medium hover:underline ml-1" href="/auth/login.html">Login here</a>
                </p>
            </footer>
        </div>
    </main>

    <script type="module">
        import apiClient from '/src/utils/apiClient.js';

        const forgotForm = document.getElementById('forgot-form');
        const submitBtn = document.getElementById('submit-btn');
        const emailInput = document.getElementById('email');
        const generalSuccess = document.getElementById('general-success');
        const generalSuccessText = document.getElementById('general-success-text');
        const generalError = document.getElementById('general-error');
        const generalErrorText = document.getElementById('general-error-text');

        forgotForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            generalError.classList.add('hidden');
            generalSuccess.classList.add('hidden');

            const email = emailInput.value.trim();
            if (!email) return;

            const originalText = submitBtn.innerText;
            submitBtn.innerText = 'SENDING LINK...';
            submitBtn.disabled = true;

            try {
                const response = await apiClient.post('/auth/forgot-password', { email });
                const data = response.data;

                if (data.success) {
                    generalSuccessText.textContent = "If this email is registered, you'll receive a reset link.";
                    generalSuccess.classList.remove('hidden');
                    forgotForm.classList.add('hidden');
                } else {
                    generalErrorText.textContent = data.message || "An unexpected error occurred.";
                    generalError.classList.remove('hidden');
                }
            } catch (err) {
                console.error("Forgot password request failed:", err);
                const response = err.response;
                if (response) {
                    const data = response.data || {};
                    generalErrorText.textContent = data.message || "An unexpected error occurred.";
                } else {
                    generalErrorText.textContent = "Unable to connect to the server. Please try again later.";
                }
                generalError.classList.remove('hidden');
            } finally {
                submitBtn.innerText = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
