<script type="module">
        import apiClient from '/src/utils/apiClient.js';
        let currentRole = 'buyer';

        function switchTab(role) {
            currentRole = role;
            const buyerTab = document.getElementById('tab-buyer');
            const sellerTab = document.getElementById('tab-seller');
            const phoneContainer = document.getElementById('phone-container');
            const phoneInput = document.getElementById('phone');
            const signupLink = document.getElementById('signup-link');

            if (role === 'buyer') {
                buyerTab.classList.remove('tab-inactive');
                buyerTab.classList.add('tab-active');
                sellerTab.classList.remove('tab-active');
                sellerTab.classList.add('tab-inactive');
                phoneContainer.classList.add('hidden');
                phoneInput.removeAttribute('required');
                if (signupLink) {
                    signupLink.setAttribute('href', 'signup-buyer.html');
                }
            } else {
                sellerTab.classList.remove('tab-inactive');
                sellerTab.classList.add('tab-active');
                buyerTab.classList.remove('tab-active');
                buyerTab.classList.add('tab-inactive');
                phoneContainer.classList.remove('hidden');
                phoneInput.setAttribute('required', 'true');
                if (signupLink) {
                    signupLink.setAttribute('href', 'signup-seller.html');
                }
            }
        }
        window.switchTab = switchTab;

        // Make sure it starts with the correct link on page load
        switchTab('buyer');

        const loginForm = document.getElementById('login-form');
        const submitBtn = document.getElementById('submit-btn');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const generalError = document.getElementById('general-error');
        const generalErrorText = document.getElementById('general-error-text');
        const generalSuccess = document.getElementById('general-success');
        const generalSuccessText = document.getElementById('general-success-text');

        // Show success message if present in URL
        const urlParams = new URLSearchParams(window.location.search);
        const msg = urlParams.get('message');
        if (msg) {
            generalSuccessText.textContent = msg;
            generalSuccess.classList.remove('hidden');
        }

        function clearErrors() {
            generalError.classList.add('hidden');
            generalSuccess.classList.add('hidden');
            emailInput.classList.remove('border-error');
            passwordInput.classList.remove('border-error');
        }

        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            clearErrors();

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                generalErrorText.textContent = "Please fill in all fields.";
                generalError.classList.remove('hidden');
                return;
            }

            const originalText = submitBtn.innerText;
            submitBtn.innerText = 'AUTHENTICATING...';
            submitBtn.style.opacity = '0.7';
            submitBtn.disabled = true;

            try {
                const response = await apiClient.post('/auth/login', { email, password });
                const data = response.data;

                if (data.success) {
                    // Success! Store access_token and refresh_token in sessionStorage
                    sessionStorage.setItem('tohfa_access_token', data.data.access_token);
                    sessionStorage.setItem('tohfa_refresh_token', data.data.refresh_token);
                    sessionStorage.setItem('tohfa_user', JSON.stringify(data.data.user));
                    
                    // Redirect based on returned role
                    if (data.data.user.role === 'seller') {
                        window.location.href = '/seller/dashboard.html';
                    } else if (data.data.user.role === 'admin') {
                        // For admin, Task 32 requires tohfa_admin_token, but let's check
                        sessionStorage.setItem('tohfa_admin_token', data.data.access_token);
                        window.location.href = '/admin/sellers.html';
                    } else {
                        window.location.href = '/buyer/home.html';
                    }
                } else {
                    generalErrorText.textContent = data.message || "An unexpected error occurred.";
                    generalError.classList.remove('hidden');
                }
            } catch (err) {
                console.error("Login request failed:", err);
                const response = err.response;
                if (response) {
                    const data = response.data || {};
                    if (response.status === 401) {
                        generalErrorText.textContent = data.message || "Incorrect email or password.";
                        emailInput.classList.add('border-error');
                        passwordInput.classList.add('border-error');
                    } else if (response.status === 403) {
                        generalErrorText.textContent = data.message || "Your account has been suspended. Contact support.";
                    } else if (response.status === 429) {
                        generalErrorText.textContent = data.message || "Too many attempts. Please try again later.";
                    } else {
                        generalErrorText.textContent = data.message || "An unexpected error occurred. Please try again.";
                    }
                } else {
                    generalErrorText.textContent = "Unable to connect to the authentication server. Please try again later.";
                }
                generalError.classList.remove('hidden');
            } finally {
                submitBtn.innerText = originalText;
                submitBtn.style.opacity = '1';
            }
        });
    </script>
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('password-toggle-icon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = 'visibility';
            }
        }

        // Lightweight hover animation for the card
        const card = document.querySelector('.bg-\\[\\#FDFAF5\\]');
        if (card) {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const rotateX = (y - centerY) / 30;
                const rotateY = (centerX - x) / 30;
                
                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            });

            card.addEventListener('mouseleave', () => {
                card.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg)';
            });
        }
    </script>
    <script src="../components/tohfa-include.js"></script>
