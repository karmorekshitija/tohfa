<div class="flex justify-between items-center px-container-padding max-w-7xl mx-auto h-full">
<div class="flex items-center gap-stack-md">
<span class="font-product-title text-product-title italic text-primary dark:text-primary-fixed cursor-pointer active:scale-95 transition-transform">
                    Tohfa<span class="text-highlight-gold">.</span>
</span>
</div>
<nav class="hidden md:flex items-center gap-8">
<a class="text-on-surface-variant dark:text-on-surface-variant hover:text-primary transition-colors duration-200 font-label-ui text-label-ui" href="#">Explore</a>
<a class="text-on-surface-variant dark:text-on-surface-variant hover:text-primary transition-colors duration-200 font-label-ui text-label-ui" href="#">Artisans</a>
<a class="text-on-surface-variant dark:text-on-surface-variant hover:text-primary transition-colors duration-200 font-label-ui text-label-ui" href="#">Our Story</a>

<!-- Main Content Canvas -->

<div class="sketch-watermark"></div>
<!-- Login Card -->
<div class="relative w-full max-w-[460px] z-10">
<!-- Scissor Motif -->
<div class="absolute -top-10 left-1/2 -translate-x-1/2 flex flex-col items-center">
<span class="material-symbols-outlined text-[#6B6B6B] text-3xl" data-icon="content_cut">content_cut</span>
<div class="h-6 w-px bg-sage-soft mt-1"></div>
</div>
<div class="bg-[#FDFAF5] border border-[#D4C9B8] rounded-[16px] p-[40px] flex flex-col items-center shadow-[0_4px_24px_rgba(0,0,0,0.07)]">
<!-- Card Header -->
<div class="text-center mb-6 w-full">
<span class="font-sans text-xs font-semibold text-[#6B6B6B] tracking-[0.2em] block mb-1 uppercase">WELCOME BACK</span>
<h1 class="font-serif text-3xl font-bold text-[#1A1A1A] mb-1">Return to the nest</h1>
<div class="flex items-center justify-center gap-2 mt-2">
<div class="h-[1px] w-8 bg-[#D4C9B8]"></div>
<span class="font-serif text-lg italic text-[#2D5016]">Tohfa<span class="text-[#C8973A]">.</span></span>
<div class="h-[1px] w-8 bg-[#D4C9B8]"></div>
</div>
</div>
<!-- Form -->
<form class="w-full flex flex-col gap-4" id="loginForm">
<!-- Error Handling Slots (Hidden by default) -->
<div class="hidden bg-danger-terracotta/10 border border-danger-terracotta/20 text-danger-terracotta p-3 rounded-lg flex items-center gap-2 text-sm" id="error401">
<span class="material-symbols-outlined text-[18px]" data-icon="warning">warning</span>
<span class="font-label-ui">Hm, that credential set doesn't seem right.</span>
</div>
<div class="flex flex-col gap-1.5 text-left">
<label class="font-sans text-sm font-medium text-[#1A1A1A] ml-1" for="email">Email address</label>
<input class="w-full bg-[#FDFAF5] border-[1.5px] border-[#D4C9B8] rounded-[8px] px-[14px] py-[12px] font-sans text-sm text-[#1A1A1A] focus:ring-1 focus:ring-[#2D5016] focus:border-[#2D5016] transition-all outline-none" id="email" placeholder="artisan@tohfa.studio" type="email"/>
</div>
<div class="flex flex-col gap-1.5 text-left w-full">
<label class="font-sans text-sm font-medium text-[#1A1A1A] ml-1" for="password">Password</label>
<div class="relative w-full">
<input class="w-full bg-[#FDFAF5] border-[1.5px] border-[#D4C9B8] rounded-[8px] px-[14px] py-[12px] font-sans text-sm text-[#1A1A1A] focus:ring-1 focus:ring-[#2D5016] focus:border-[#2D5016] transition-all outline-none" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-[#6B6B6B] hover:text-[#2D5016] transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" data-icon="visibility" id="passIcon">visibility</span>
</button>
</div>
<div class="flex justify-end mt-1">
<a class="text-xs text-[#2D5016] hover:underline font-medium" href="#">Forgot password?</a>
</div>
</div>
<button class="w-full bg-[#2D5016] text-white font-semibold text-sm py-[14px] rounded-[8px] hover:bg-[#1e360f] transition-all duration-300 shadow-md active:scale-[0.98] mt-2" type="submit">
                        Log in
                    </button>
</form>

<div class="flex-grow h-[1px] bg-[#D4C9B8]"></div>

<div class="flex-grow h-[1px] bg-[#D4C9B8]"></div>
</div>

<a class="font-sans text-xs text-[#2D5016] hover:text-[#C8973A] transition-colors tracking-widest font-semibold uppercase flex items-center justify-center gap-2 mt-1" href="#">
<span class="material-symbols-outlined text-[14px]" data-icon="auto_awesome" data-weight="fill" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>

</div>

<div id="tohfa-footer"></div>
<script>
        function togglePassword() {
            const passInput = document.getElementById('password');
            const icon = document.getElementById('passIcon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                passInput.type = 'password';
                icon.innerText = 'visibility';
            }
        }

        // Simple form interaction simulation
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const errorDiv = document.getElementById('error401');
            errorDiv.classList.remove('hidden');
            
            // Shake effect for feedback
            const card = errorDiv.parentElement.parentElement;
            card.classList.add('animate-shake');
            setTimeout(() => card.classList.remove('animate-shake'), 400);
        });
    </script>
<style>
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-shake {
            animation: shake 0.2s ease-in-out 0s 2;
        }
    </style>
