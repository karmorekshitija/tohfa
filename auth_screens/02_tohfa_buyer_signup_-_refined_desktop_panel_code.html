<!DOCTYPE html><html lang="en"><head>

                "secondary": "#49663f",
                "inverse-surface": "#2e312e",
                "gold-soft": "#EBD7AE",
                "surface-tint": "#3a684c",
                "on-primary-container": "#b7e9c6",
                "accent-violet": "#7B5EA7",
                "inverse-primary": "#a0d2b0",
                "violet-soft": "#D8CBE9",
                "bg-cream-deep": "#F1EADD",
                "surface-variant": "#e2e3df",
                "tertiary": "#6e3a40",
                "sage-soft": "#C5D6BC",
                "on-tertiary": "#ffffff",

      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .ink-wash {
            background: radial-gradient(circle at top right, rgba(197, 214, 188, 0.15) 0%, transparent 60%);
        }
        .parchment-shadow {
            box-shadow: 0 10px 25px -5px rgba(58, 51, 40, 0.1), 0 8px 10px -6px rgba(58, 51, 40, 0.1);
        }
        .sketch-overlay {
            background-image: url("https://www.transparenttextures.com/patterns/handmade-paper.png");
            opacity: 0.05;
        }
    </style>
</head>
<body class="bg-[#F0EDE6] text-text-default font-body-main selection:bg-violet-soft selection:text-accent-violet">
<!-- Top Navigation -->
<div id="tohfa-navbar"></div>

<main class="min-h-screen relative flex items-center justify-center py-16 px-4 bg-[#F0EDE6]">
<!-- Sketch Watermark -->
<div class="absolute inset-0 pointer-events-none sketch-overlay"></div>
<!-- Signup Card Container -->
<div class="relative w-full max-w-[440px]">
<!-- Chibi Bunny Illustration -->
<div class="absolute -left-12 bottom-12 z-20 pointer-events-none transform -rotate-12 hidden md:block">
<img alt="Chibi bunny" class="w-32 h-32 object-contain filter drop-shadow-md" data-alt="A charming and minimalist chibi-style bunny illustration peeking from behind a white card edge." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCadk-2drJq0LYoijz6rryq0fOWvUwrHaReluSNvikJubW_NPyM710x2mUyZgcAgx-UDJ6DfWLpBLly2qYjCPJ4t4lFR22keOevG5dUvxd1kQUqfxUC2EiN1tTqhsOKVcbY9vhNI2DC3ZOX7q_Q0qF0B3uvvhTjJdHO8YCzGMBeX8UiY9vXA1f1ExGyF7KAvVxWYHYe4Ar4_dmpF7kiHPfB2vruB6SXhg6-BtWdB2FobpBi8uemsnyP7TuppH-gwE9oHPZN00t1B_eV">
</div>
<!-- The Parchment Card -->
<div class="bg-[#FDFAF5] border border-[#D4C9B8] rounded-[16px] p-[40px] relative overflow-hidden shadow-[0_4px_24px_rgba(0,0,0,0.07)]">
<!-- Watercolor subtle wash in corner -->
<div class="absolute top-0 right-0 w-32 h-32 bg-violet-soft/10 rounded-full blur-3xl -mr-10 -mt-10"></div>
<!-- Header Section -->
<div class="text-center mb-8 relative">
<div class="inline-flex flex-col items-center justify-center mb-2">
<span class="material-symbols-outlined text-[#2D5016] mb-2 opacity-60">brush</span>
<h2 class="font-serif italic text-3xl text-[#2D5016] font-bold select-none">Tohfa<span class="text-[#C8973A]">.</span></h2>
</div>
<p class="font-sans text-[10px] font-semibold text-[#6B6B6B] tracking-[0.2em] uppercase mb-1">BEGIN YOUR COLLECTION</p>
<h3 class="font-serif text-xl text-[#1A1A1A] leading-tight">Join our community of craft lovers</h3>
</div>
<!-- Signup Form -->
<form class="space-y-4 relative z-10" onsubmit="event.preventDefault();">
<!-- Full Name -->
<div class="space-y-1.5">
<label class="block font-sans text-sm font-medium text-[#1A1A1A]">Full Name</label>
<input class="w-full bg-[#FDFAF5] border-[1.5px] border-[#D4C9B8] rounded-[8px] px-[14px] py-[12px] font-sans text-sm text-[#1A1A1A] focus:ring-1 focus:ring-[#2D5016] focus:border-[#2D5016] transition-all outline-none" placeholder="Enter your full name" type="text">
</div>
<!-- Email Address -->
<div class="space-y-1.5">
<label class="block font-sans text-sm font-medium text-[#1A1A1A]">Email Address</label>
<input class="w-full bg-[#FDFAF5] border-[1.5px] border-[#D4C9B8] rounded-[8px] px-[14px] py-[12px] font-sans text-sm text-[#1A1A1A] focus:ring-1 focus:ring-[#2D5016] focus:border-[#2D5016] transition-all outline-none" placeholder="example@toufa.com" type="email">
</div>
<!-- Password -->
<div class="space-y-1.5">
<label class="block font-sans text-sm font-medium text-[#1A1A1A]">Password</label>
<div class="relative">
<input class="w-full bg-[#FDFAF5] border-[1.5px] border-[#D4C9B8] rounded-[8px] px-[14px] py-[12px] font-sans text-sm text-[#1A1A1A] focus:ring-1 focus:ring-[#2D5016] focus:border-[#2D5016] transition-all outline-none" id="password-input" placeholder="Create a password" type="password">
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-[#6B6B6B] hover:text-[#2D5016]" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-xl" id="password-icon">visibility</span>
</button>
</div>
<p class="text-xs font-sans text-[#6B6B6B] mt-1.5 italic px-1">Must be at least 8 characters long.</p>
</div>
<!-- Submit Action -->
<button class="w-full bg-[#2D5016] text-white font-semibold text-sm py-[14px] rounded-[8px] hover:bg-[#1e360f] transition-all duration-300 shadow-md active:scale-[0.98] mt-4">
                        Create account
                    </button>
</form>
<!-- Footer Links -->
<div class="mt-8 pt-6 border-t border-sage-soft/30 text-center space-y-4">
<p class="text-sm text-[#6B6B6B]">
                        Already have an account? 
                        <a class="text-[#2D5016] font-semibold hover:underline" href="#">Log in</a>
</p>
<div class="pt-2">
<a class="font-sans text-xs text-[#2D5016] hover:text-[#C8973A] transition-colors tracking-widest font-semibold uppercase flex items-center justify-center gap-2" href="#">
                            ✦ SELL ON TOHFA INSTEAD
                        </a>
</div>
</div>
</div>
</div>
</main>
<!-- Artisan Collective Footer -->
<div id="tohfa-footer"></div>
<script>
        function togglePassword() {
            const input = document.getElementById('password-input');
            const icon = document.getElementById('password-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                input.type = 'password';
                icon.innerText = 'visibility';
            }
        }
    </script>
<script src="../components/tohfa-include.js"></script></body></html>
